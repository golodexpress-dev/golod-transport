name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare public/ folder (copy every tracked file except workflow/config files)
        run: |
          mkdir -p public
          git ls-files \
            | grep -v '^\.github/' \
            | grep -v '^firebase\.json$' \
            | grep -v '^\.firebaserc$' \
            | while IFS= read -r f; do
                mkdir -p "public/$(dirname "$f")"
                cp "$f" "public/$f"
              done
          echo "----- Files that will be deployed -----"
          find public -maxdepth 1 -type f | sort

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project status-81cd0 --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
