<script>
// ===== SESSION =====
var CU = null;
(function(){
  var s = typeof GolodSession!=="undefined" ? GolodSession.get() : null;
  if(!s){ window.location.href="GolodApp.html"; return; }
  if(!["admin","branch","clerk"].includes(s.role)){ window.location.href="GolodApp.html"; return; }
  CU = s;
  document.getElementById("session-info").textContent = s.name + " · " + (s.branch==="all"?"ทุกสาขา":s.branch);
})();

// ===== DATA =====
var BILLS = [];
var DRIVERS = [];
var BRANCHES = [
  {id:"bkk", label:"สาขากรุงเทพ"},
  {id:"ptm", label:"สาขาปทุมธานี"},
  {id:"krt", label:"สาขานครราชสีมา"},
  {id:"ssk", label:"สาขาศรีสะเกษ"}
];
var BRANCH_LABEL = {bkk:"กรุงเทพ",ptm:"ปทุมธานี",krt:"นครราชสีมา",ssk:"ศรีสะเกษ"};

// ===== ZONE MAP (เหมือน SalesReport) =====
var ZONE_MAP = {
  BKK:    {label:"BKK",    provinces:["กรุงเทพมหานคร","ปทุมธานี","นนทบุรี","สมุทรปราการ","สมุทรสาคร"]},
  West:   {label:"West",   provinces:["ราชบุรี","นครปฐม","สุพรรณบุรี","กาญจนบุรี"]},
  South:  {label:"South",  provinces:["สมุทรสงคราม","เพชรบุรี","ประจวบคีรีขันธ์","ชุมพร","ระนอง","สุราษฎร์ธานี","นครศรีธรรมราช","กระบี่","พังงา","ภูเก็ต","ตรัง","พัทลุง","สตูล","สงขลา","ปัตตานี","ยะลา","นราธิวาส"]},
  North:  {label:"North",  provinces:["นครสวรรค์","กำแพงเพชร","อุทัยธานี","ตาก","พิษณุโลก","พิจิตร","อุตรดิตถ์","สุโขทัย","เพชรบูรณ์","ลำปาง","ลำพูน","เชียงใหม่","แพร่","น่าน","แม่ฮ่องสอน","เชียงราย","พะเยา"]},
  East:   {label:"East",   provinces:["ชลบุรี","ระยอง","จันทบุรี","ตราด","สระแก้ว","ฉะเชิงเทรา","นครนายก","ปราจีนบุรี"]},
  Central:{label:"Central",provinces:["ชัยนาท","ลพบุรี","สระบุรี","อ่างทอง","สิงห์บุรี","พระนครศรีอยุธยา"]},
  Korat:  {label:"Korat",  provinces:["นครราชสีมา"]},
  LEsan:  {label:"LEsan",  provinces:["สุรินทร์","ศรีสะเกษ","อุบลราชธานี","ยโสธร","อำนาจเจริญ"]},
  Esan:   {label:"Esan",   provinces:["ชัยภูมิ","หนองบัวลำภู","อุดรธานี","หนองคาย","ขอนแก่น","บึงกาฬ","สกลนคร","มหาสารคาม","ร้อยเอ็ด","กาฬสินธุ์","มุกดาหาร","นครพนม"]}
};

function getZone(prov, amphoe){
  prov = prov||""; amphoe = amphoe||"";
  if(prov==="เลย"){
    return ["ด่านซ้าย","นาแห้ว","ภูเรือ"].indexOf(amphoe)>=0 ? "North" : "Esan";
  }
  if(prov==="บุรีรัมย์"){
    return ["บ้านใหม่ไชยพจน์","พุทไธสง","นาโพธิ์"].indexOf(amphoe)>=0 ? "Esan" : "LEsan";
  }
  if(prov==="เพชรบูรณ์"){
    return amphoe==="น้ำหนาว" ? "Esan" : "North";
  }
  for(var z in ZONE_MAP){
    if(ZONE_MAP[z].provinces.indexOf(prov)>=0) return z;
  }
  return "";
}

var STATUS_LIST = [
  {v:"issued",            l:"ออกบิลรับของ",        cls:"st-issued"},
  {v:"ออกบิลรับของ",      l:"ออกบิลรับของ",        cls:"st-issued"},
  {v:"ระหว่างนำส่งสาขา",  l:"ระหว่างนำส่งสาขา",    cls:"st-branch"},
  {v:"กำลังวิ่งส่งลูกค้า",l:"กำลังวิ่งส่งลูกค้า",  cls:"st-driving"},
  {v:"ส่งสำเร็จ",          l:"ส่งสำเร็จ",           cls:"st-done"},
  {v:"ส่งไม่สำเร็จ",       l:"ส่งไม่สำเร็จ",        cls:"st-fail"},
  {v:"นำกลับสาขา",         l:"นำกลับสาขา",          cls:"st-return"},
  {v:"ลูกค้ารับกลับ",      l:"ลูกค้ารับกลับ",       cls:"st-new"},
  {v:"นำส่งใหม่",          l:"นำส่งใหม่",           cls:"st-new"}
];

// ============================================================
// FIX 1: สถานะที่แสดงในแท็บ "สำเร็จ/ไม่สำเร็จ"
// เดิม DONE_STATUS ถูกใช้กรองออกตั้งแต่ตอน loadData ทำให้
// บิลที่ "ส่งไม่สำเร็จ" / "นำกลับสาขา" / "ลูกค้ารับกลับ"
// ยังปรากฏในแท็บ pending/driving ซ้ำๆ ทุกวัน
// แก้: เก็บทุกบิลไว้ใน BILLS แล้วให้ filterBills จัดการ
// ============================================================
var DONE_TAB_STATUS = [
  "ส่งสำเร็จ","delivered","success",
  "ส่งไม่สำเร็จ","นำกลับสาขา","ลูกค้ารับกลับ"
];

// สถานะที่ถือว่า "ยังค้างอยู่" — ต้องโชว์ข้ามวันได้
var ACTIVE_STATUS = [
  "ออกบิลรับของ","issued","",
  "ระหว่างนำส่งสาขา",
  "กำลังวิ่งส่งลูกค้า","นำส่งใหม่"
];

function stClass(v){
  var f=STATUS_LIST.find(function(s){return s.v===v;});
  return f?f.cls:"st-issued";
}

var selectedBills  = {};
var currentTab     = "pending";
var dispatchMode   = "";
var statusTargetBill = null;

// ============================================================
// FIX 2: Date filter — default วันนี้, user เลือกช่วงได้
// ============================================================
function todayStr(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
var filterDateMode = "today";
var filterDateFrom = todayStr();
var filterDateTo   = todayStr();

function getDateRange(mode){
  var now=new Date();
  var pad=function(n){return String(n).padStart(2,"0");};
  var fmt=function(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());};
  if(mode==="today")     { var s=fmt(now); return {from:s,to:s}; }
  if(mode==="yesterday") { var y=new Date(now); y.setDate(y.getDate()-1); var s=fmt(y); return {from:s,to:s}; }
  if(mode==="week")      { var w=new Date(now); w.setDate(w.getDate()-6); return {from:fmt(w),to:fmt(now)}; }
  if(mode==="all")       { return {from:"",to:""}; }
  return {from:filterDateFrom, to:filterDateTo}; // range
}

// แปลง bill date เป็น YYYY-MM-DD (รองรับทั้ง createdAt และ date field)
function billDateStr(b){
  if(b.createdAt){
    try{
      var d=new Date(b.createdAt);
      if(!isNaN(d.getTime())){
        return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      }
    }catch(e){}
  }
  if(b.date){
    var s=String(b.date);
    if(s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
    if(s.match(/^\d{1,2}\/\d{1,2}\/\d{4}/)){
      var p=s.split("/");
      var y=parseInt(p[2]); if(y>2400) y-=543;
      return y+"-"+String(p[1]).padStart(2,"0")+"-"+String(p[0]).padStart(2,"0");
    }
  }
  return "";
}

// ===== GET BRANCH OF USER =====
function getUserBranch(){
  if(!CU) return "bkk";
  if(CU.branch==="all") return "all";
  var m={กรุงเทพ:"bkk",ปทุมธานี:"ptm",นครราชสีมา:"krt",ศรีสะเกษ:"ssk"};
  return m[CU.branch]||CU.branch;
}

// ===== LOAD DATA =====
function loadData(){
  document.getElementById("app").innerHTML='<div class="loading">⏳ กำลังดึงข้อมูล...</div>';
  GolodDB.ready(function(){
    Promise.all([
      GolodDB.getBillsNew(1000),
      GolodDB.getUsers()
    ]).then(function(results){
      var bills = results[0]||[];
      var users = results[1]||[];

      // normalize
      var normalized = bills.map(function(b){
        if(b.form && typeof b.form==="string"){ try{b.form=JSON.parse(b.form);}catch(e){b.form={};} }
        if(!b.form) b.form={};
        if(!b.status) b.status="ออกบิลรับของ";
        return b;
      }).filter(function(b){ return b.billNo; });

      // FIX: เก็บ BILLS ทุกใบ ไม่กรอง DONE_STATUS ออกที่นี่
      // เพราะถ้ากรองออก บิลที่ส่งไม่สำเร็จ/นำกลับ จะหายจากแท็บ done ด้วย
      // และบิลที่ยังค้างอยู่ก็จะโผล่กลับมาถ้า status ไม่ตรง DONE_STATUS
      BILLS = normalized;

      // filter by branch
      var ub = getUserBranch();
      if(ub!=="all"){
        BILLS = BILLS.filter(function(b){
          var bb=b.branch||"bkk";
          var tb=b.targetBranch||"";
          return bb===ub || tb===ub;
        });
      }

      DRIVERS = users.filter(function(u){ return u.role==="driver"; });
      renderApp();
    }).catch(function(e){
      document.getElementById("app").innerHTML='<div class="loading">❌ โหลดไม่สำเร็จ: '+e.message+'</div>';
    });
  });
}

// ============================================================
// FIX 3: filterBills — รวม date range + tab + logic ค้างข้ามวัน
// ============================================================
function filterBills(tab){
  var range = getDateRange(filterDateMode);

  return BILLS.filter(function(b){
    var st = b.status || "";
    var isActive = ACTIVE_STATUS.indexOf(st) >= 0;
    var isDone   = DONE_TAB_STATUS.indexOf(st) >= 0;

    // --- กรองวันที่ ---
    if(range.from || range.to){
      var ds = billDateStr(b);
      var inRange = (!range.from || ds >= range.from) && (!range.to || ds <= range.to);

      if(tab === "done"){
        // แท็บ done: กรองวันที่เสมอ (ต้องการดูเฉพาะวันที่เลือก)
        if(ds && !inRange) return false;
      } else if(tab === "all"){
        // แท็บ all: กรองวันที่เสมอ
        if(ds && !inRange) return false;
      } else {
        // แท็บ active (pending/branch/driving):
        // ถ้าบิลยัง active อยู่ → โชว์ข้ามวันได้ (ไม่กรองวันที่)
        // ถ้าบิล done แล้ว → กรองวันที่ตามปกติ
        if(!isActive && ds && !inRange) return false;
      }
    }

    // --- กรองตาม tab ---
    if(tab==="pending") return st==="ออกบิลรับของ" || st==="issued" || st==="";
    if(tab==="branch")  return st==="ระหว่างนำส่งสาขา";
    if(tab==="driving") return st==="กำลังวิ่งส่งลูกค้า" || st==="นำส่งใหม่";
    if(tab==="done")    return isDone;
    return true; // all
  });
}

// ===== RENDER =====
function renderApp(){
  var tabs = [
    {k:"pending", l:"รอจ่ายงาน"},
    {k:"branch",  l:"ระหว่างส่งสาขา"},
    {k:"driving", l:"กำลังส่ง"},
    {k:"done",    l:"สำเร็จ/ไม่สำเร็จ"},
    {k:"all",     l:"ทั้งหมด"}
  ];

  var tabHTML = tabs.map(function(t){
    var cnt = filterBills(t.k).length;
    return '<div class="tab'+(currentTab===t.k?" active":"")+'" onclick="switchTab(\''+t.k+'\')">'
      +t.l+'<span class="count-badge">'+cnt+'</span></div>';
  }).join("");

  // Date filter bar
  var dateBar = '<div class="date-filter-bar">'
    +'<label>📅 ช่วงวันที่:</label>'
    +'<select onchange="onDateModeChange(this.value)">'
    +[
      {v:"today",     l:"วันนี้"},
      {v:"yesterday", l:"เมื่อวาน"},
      {v:"week",      l:"7 วันย้อนหลัง"},
      {v:"all",       l:"ทั้งหมด"},
      {v:"range",     l:"กำหนดเอง"}
    ].map(function(m){
      return '<option value="'+m.v+'"'+(filterDateMode===m.v?" selected":"")+'>'+m.l+'</option>';
    }).join("")
    +'</select>';
  if(filterDateMode==="range"){
    dateBar += '<input type="date" value="'+filterDateFrom+'" onchange="filterDateFrom=this.value;renderApp()">'
      +'<span style="font-size:11px;color:#888">ถึง</span>'
      +'<input type="date" value="'+filterDateTo+'" onchange="filterDateTo=this.value;renderApp()">';
  }
  dateBar += '</div>';

  var filtered = filterBills(currentTab);

  var actionBar = '';
  if(currentTab !== "done"){
    actionBar = '<div class="action-bar">'
      +'<button class="btn btn-gray" onclick="toggleSelectAll()">☑ เลือกทั้งหมด</button>'
      +'<button class="btn btn-orange" onclick="openDispatch(&quot;branch&quot;)">📦 จ่ายให้สาขา</button>'
      +'<button class="btn btn-blue" onclick="openDispatch(&quot;driver&quot;)">🚛 จ่ายให้คนรถ</button>'
      +'<span style="font-size:11px;color:#666">เลือก <span id="sel-count">0</span> บิล</span>'
      +'</div>';
  }

  var ZONE_COLOR = {BKK:"#c0392b",West:"#d35400",South:"#27ae60",North:"#2471a3",East:"#8e44ad",Central:"#0f6e56",Korat:"#b7950b",LEsan:"#a93226",Esan:"#1a5276"};
  var rows = filtered.map(function(b){
    var checked = selectedBills[b.billNo]?"checked":"";
    var stCls   = stClass(b.status);
    var destAmphoe = b.destAmphoe||b.form.destAmphoe||"";
    var destProv   = b.destProv||b.form.destProv||"";
    var dest    = destAmphoe+"·"+destProv;
    var sender  = b.senderName||b.form.senderName||"";
    var receiver= b.receiverName||b.form.receiverName||"";
    var freight = parseFloat(b.freightNet||0);
    var driver  = b.driverName||b.driver||"—";
    var zone    = getZone(destProv, destAmphoe);
    var zoneClr = ZONE_COLOR[zone]||"#888";
    var zoneHTML= zone ? '<span style="display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;background:'+zoneClr+'22;color:'+zoneClr+'">'+zone+'</span>' : '—';
    var ds      = billDateStr(b)||"—";
    return '<tr>'
      +'<td><input type="checkbox" class="chk" '+(checked?"checked":"")
      +' onchange="toggleBill(\''+b.billNo+'\')" data-id="'+b.billNo+'"></td>'
      +'<td style="font-weight:600;white-space:nowrap">'+b.billNo+'</td>'
      +'<td style="white-space:nowrap;color:#888;font-size:11px">'+ds+'</td>'
      +'<td>'+receiver+'</td>'
      +'<td style="white-space:nowrap">'+dest+'</td>'
      +'<td style="text-align:right;font-weight:600">'+freight.toLocaleString("th-TH")+'</td>'
      +'<td><span class="badge '+stCls+'">'+b.status+'</span></td>'
      +'<td style="color:#555">'+sender+'</td>'
      +'<td>'+zoneHTML+'</td>'
      +'<td style="color:#666">'+driver+'</td>'
      +'<td>'
      +'<button class="btn btn-gray" onclick="openStatusModal(\''+b.billNo+'\')">อัปเดต</button>'
      +'</td>'
      +'</tr>';
  }).join("");

  var html = '<div class="card">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<div class="card-title" style="margin:0">🚛 จัดการขนส่ง</div>'
    +'<button class="btn btn-gray" onclick="loadData()">🔄 รีเฟรช</button>'
    +'</div>'
    +dateBar
    +'<div class="tab-bar">'+tabHTML+'</div>'
    +'<div class="filters">'
    +'<input type="text" id="q-inp" placeholder="ค้นหาเลขบิล / ชื่อ / จังหวัด" style="width:240px" oninput="filterTable()">'
    +'</div>'
    +actionBar
    +'<div style="overflow-x:auto"><table>'
    +'<tr><th></th><th>เลขบิล</th><th>วันที่</th><th>ผู้รับ</th><th>ปลายทาง</th>'
    +'<th>ค่าส่ง</th><th>สถานะ</th><th>ผู้ส่ง</th><th>Zone</th><th>คนรถ</th><th>จัดการ</th></tr>'
    +rows
    +'</table></div>'
    +'<div style="font-size:11px;color:#888;margin-top:8px">แสดง '+filtered.length+' บิล</div>'
    +'</div>';

  document.getElementById("app").innerHTML = html;
  selectedBills = {};
  updateSelCount();
}

function onDateModeChange(mode){
  filterDateMode = mode;
  if(mode !== "range"){
    var r = getDateRange(mode);
    filterDateFrom = r.from;
    filterDateTo   = r.to;
  }
  renderApp();
}

function switchTab(t){ currentTab=t; selectedBills={}; renderApp(); }

function filterTable(){
  var q=(document.getElementById("q-inp")||{}).value||"";
  q=q.toLowerCase();
  var rows=document.querySelectorAll("table tr");
  rows.forEach(function(r,i){
    if(i===0){r.style.display="";return;}
    var txt=r.textContent.toLowerCase();
    r.style.display=(!q||txt.includes(q))?"":"none";
  });
}

function toggleBill(id){
  if(selectedBills[id]) delete selectedBills[id];
  else selectedBills[id]=true;
  updateSelCount();
}

function toggleSelectAll(){
  var rows=document.querySelectorAll("input[data-id]");
  var allChecked=Object.keys(selectedBills).length===rows.length;
  selectedBills={};
  rows.forEach(function(r){
    if(!allChecked){ selectedBills[r.getAttribute("data-id")]=true; r.checked=true; }
    else r.checked=false;
  });
  updateSelCount();
}

function updateSelCount(){
  var el=document.getElementById("sel-count");
  if(el) el.textContent=Object.keys(selectedBills).length;
}

// ===== DISPATCH MODAL =====
function openDispatch(mode){
  var ids=Object.keys(selectedBills);
  if(ids.length===0){ alert("กรุณาเลือกบิลก่อน"); return; }
  dispatchMode=mode;
  document.getElementById("modal-title").textContent = mode==="branch"?"📦 จ่ายให้สาขา":"🚛 จ่ายให้คนรถ";
  document.getElementById("modal-bill-count").textContent="เลือก "+ids.length+" บิล";
  var sel=document.getElementById("modal-target");
  sel.innerHTML="";
  if(mode==="branch"){
    BRANCHES.forEach(function(b){
      var opt=document.createElement("option");
      opt.value=b.id; opt.text=b.label;
      sel.appendChild(opt);
    });
  } else {
    var ub=getUserBranch();
    var drivers=DRIVERS.filter(function(d){
      if(ub==="all") return true;
      var m={bkk:"กรุงเทพ",ptm:"ปทุมธานี",krt:"นครราชสีมา",ssk:"ศรีสะเกษ"};
      return d.branch===m[ub];
    });
    if(drivers.length===0){ alert("ไม่พบคนรถในสาขานี้"); return; }
    drivers.forEach(function(d){
      var opt=document.createElement("option");
      opt.value=d.username; opt.text=d.name+" ("+d.branch+")";
      sel.appendChild(opt);
    });
  }
  document.getElementById("modal-dispatch").classList.add("show");
}

function closeModal(){ document.getElementById("modal-dispatch").classList.remove("show"); }

function confirmDispatch(){
  var ids=Object.keys(selectedBills);
  var target=document.getElementById("modal-target").value;
  var targetText=document.getElementById("modal-target").options[document.getElementById("modal-target").selectedIndex].text;
  var newStatus = dispatchMode==="branch"?"ระหว่างนำส่งสาขา":"กำลังวิ่งส่งลูกค้า";

  var btn=document.getElementById("modal-confirm-btn");
  btn.disabled=true; btn.textContent="กำลังบันทึก...";

  var promises=ids.map(function(id){
    var upd={status:newStatus, updatedAt:new Date().toISOString()};
    if(dispatchMode==="branch"){ upd.targetBranch=target; upd.targetBranchLabel=targetText; }
    else { upd.driver=target; upd.driverName=targetText; }
    return GolodDB.updateBill(id,upd);
  });

  Promise.all(promises).then(function(){
    ids.forEach(function(id){
      var b=BILLS.find(function(x){return x.billNo===id;});
      if(b){
        b.status=newStatus;
        if(dispatchMode==="branch"){b.targetBranch=target;b.targetBranchLabel=targetText;}
        else{b.driver=target;b.driverName=targetText;}
      }
    });
    closeModal();
    btn.disabled=false; btn.textContent="ยืนยัน";
    alert("✅ จ่ายงาน "+ids.length+" บิล สำเร็จ!");
    selectedBills={};
    renderApp();
  }).catch(function(e){
    btn.disabled=false; btn.textContent="ยืนยัน";
    alert("❌ เกิดข้อผิดพลาด: "+e.message);
  });
}

// ===== STATUS MODAL =====
function openStatusModal(billNo){
  statusTargetBill=billNo;
  var b=BILLS.find(function(x){return x.billNo===billNo;});
  document.getElementById("modal-status-bill").textContent="บิล "+billNo+(b?" — "+(b.destProv||""):"");
  var sel=document.getElementById("modal-status-sel");
  sel.innerHTML="";
  STATUS_LIST.forEach(function(s){
    var opt=document.createElement("option");
    opt.value=s.v; opt.text=s.l;
    if(b&&b.status===s.v) opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=function(){
    document.getElementById("modal-fail-wrap").style.display=sel.value==="ส่งไม่สำเร็จ"?"block":"none";
  };
  document.getElementById("modal-fail-wrap").style.display="none";
  document.getElementById("modal-status-note").value="";
  document.getElementById("modal-status").classList.add("show");
}

function closeStatusModal(){ document.getElementById("modal-status").classList.remove("show"); }

function confirmStatus(){
  var newStatus=document.getElementById("modal-status-sel").value;
  var note=document.getElementById("modal-status-note").value;
  var upd={status:newStatus, updatedAt:new Date().toISOString()};
  if(newStatus==="ส่งไม่สำเร็จ"){
    upd.failReason=document.getElementById("modal-fail-reason").value;
  }
  if(note) upd.note=note;

  GolodDB.updateBill(statusTargetBill,upd).then(function(){
    var b=BILLS.find(function(x){return x.billNo===statusTargetBill;});
    if(b){
      b.status=newStatus;
      if(upd.failReason) b.failReason=upd.failReason;
    }
    closeStatusModal();
    alert("✅ อัปเดตสถานะแล้ว");
    renderApp();
  }).catch(function(e){ alert("❌ "+e.message); });
}

// ===== INIT =====
GolodDB.ready(loadData);
</script>
</body>
</html>
