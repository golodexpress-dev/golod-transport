  East:   {label:"East",   provinces:["ชลบุรี","ระยอง","จันทบุรี","ตราด","สระแก้ว","ฉะเชิงเทรา","นครนายก","ปราจีนบุรี"]},
  Central:{label:"Central",provinces:["ชัยนาท","ลพบุรี","สระบุรี","อ่างทอง","สิงห์บุรี","พระนครศรีอยุธยา"]},
  Korat:  {label:"Korat",  provinces:["นครราชสีมา"]},
  LEsan:  {label:"LEsan",  provinces:["สุรินทร์","ศรีสะเกษ","อุบลราชธานี","ยโสธร","อำนาจเจริญ"]},
  Esan:   {label:"Esan",   provinces:["ชัยภูมิ","หนองบัวลำภู","อุดรธานี","หนองคาย","ขอนแก่น","บึงกาฬ","สกลนคร","มหาสารคาม","ร้อยเอ็ด","กาฬสินธุ์","มุกดาหาร","นครพนม"]}

function getZone(prov, amphoe){
  prov = prov||""; amphoe = amphoe||"";
  if(prov==="เลย"){
    return ["ด่านซ้าย","นาแห้ว","ภูเรือ"].indexOf(amphoe)>=0 ? "North" : "Esan";
  }
  if(prov==="บุรีรัมย์"){
    return ["บ้านใหม่ไชยพจน์","พุทไธสง","นาโพธิ์"].indexOf(amphoe)>=0 ? "Esan" : "LEsan";
  }
  if(prov==="เพชรบูรณ์"){
    return amphoe==="น้ำหนาว" ? "Esan" : "North";
  }
  for(var z in ZONE_MAP){
    if(ZONE_MAP[z].provinces.indexOf(prov)>=0) return z;
  }
  return "";
}

var STATUS_LIST = [
  {v:"issued",            l:"ออกบิลรับของ",        cls:"st-issued"},

  {v:"กำลังวิ่งส่งลูกค้า",l:"กำลังวิ่งส่งลูกค้า",  cls:"st-driving"},
  {v:"ส่งสำเร็จ",          l:"ส่งสำเร็จ",           cls:"st-done"},

// ============================================================
// FIX 1: สถานะที่แสดงในแท็บ "สำเร็จ/ไม่สำเร็จ"
// เดิม DONE_STATUS ถูกใช้กรองออกตั้งแต่ตอน loadData ทำให้
// บิลที่ "ส่งไม่สำเร็จ" / "นำกลับสาขา" / "ลูกค้ารับกลับ"
// ยังปรากฏในแท็บ pending/driving ซ้ำๆ ทุกวัน
// แก้: เก็บทุกบิลไว้ใน BILLS แล้วให้ filterBills จัดการ
// ============================================================
var DONE_TAB_STATUS = [
  "ส่งสำเร็จ","delivered","success",
  "ส่งไม่สำเร็จ","นำกลับสาขา","ลูกค้ารับกลับ"
];

var ACTIVE_STATUS = [
  "ออกบิลรับของ","issued","",
  "ระหว่างนำส่งสาขา",
  "กำลังวิ่งส่งลูกค้า","นำส่งใหม่"
];

function stClass(v){

var selectedBills  = {};
var currentTab     = "pending";
var dispatchMode   = "";
var statusTargetBill = null;

// ============================================================
// FIX 2: Date filter — default วันนี้, user เลือกช่วงได้
// ============================================================
function todayStr(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
var filterDateMode = "today";
var filterDateFrom = todayStr();
var filterDateTo   = todayStr();

function getDateRange(mode){
  var now=new Date();
  var pad=function(n){return String(n).padStart(2,"0");};
  var fmt=function(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());};
  if(mode==="today")     { var s=fmt(now); return {from:s,to:s}; }
  if(mode==="yesterday") { var y=new Date(now); y.setDate(y.getDate()-1); var s=fmt(y); return {from:s,to:s}; }
  if(mode==="week")      { var w=new Date(now); w.setDate(w.getDate()-6); return {from:fmt(w),to:fmt(now)}; }
  if(mode==="all")       { return {from:"",to:""}; }
  return {from:filterDateFrom, to:filterDateTo}; // range
}

// แปลง bill date เป็น YYYY-MM-DD (รองรับทั้ง createdAt และ date field)
function billDateStr(b){
  if(b.createdAt){
    try{
      var d=new Date(b.createdAt);
      if(!isNaN(d.getTime())){
        return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      }
    }catch(e){}
  }
  if(b.date){
    var s=String(b.date);
    if(s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
    if(s.match(/^\d{1,2}\/\d{1,2}\/\d{4}/)){
      var p=s.split("/");
      var y=parseInt(p[2]); if(y>2400) y-=543;
      return y+"-"+String(p[1]).padStart(2,"0")+"-"+String(p[0]).padStart(2,"0");
    }
  }
  return "";
}

// ===== GET BRANCH OF USER =====
function getUserBranch(){
  if(!CU) return "bkk";
  if(CU.branch==="all") return "all";
  var m={กรุงเทพ:"bkk",ปทุมธานี:"ptm",นครราชสีมา:"krt",ศรีสะเกษ:"ssk"};
  return m[CU.branch]||CU.branch;
}

// ===== LOAD DATA =====
// กลยุทธ์โหลดเร็ว:
// 1. ดึงบิล active (ยังไม่ปิด) ทั้งหมด — limit 300 (ส่วนมากไม่เกิน 100)
// 2. ดึงบิล done 30 วันย้อนหลัง — limit 200
// 3. Merge ทั้งสองชุด
function loadData(){
  document.getElementById("app").innerHTML='<div class="loading">⏳ กำลังดึงข้อมูล...</div>';
  GolodDB.ready(function(){
    var db = firebase.firestore();
    var ub = getUserBranch();

    // Query 1: บิล active (status ที่ยังวิ่งอยู่) — ไม่ต้องกรองวันที่
    var activeStatuses = ["ออกบิลรับของ","issued","","ระหว่างนำส่งสาขา","กำลังวิ่งส่งลูกค้า","นำส่งใหม่"];
    var q1 = db.collection("bills").limit(400);
    if(ub !== "all") q1 = db.collection("bills").where("branch","==",ub).limit(400);

    // Query 2: users
    var q2 = GolodDB.getUsers();

    Promise.all([q1.get(), q2]).then(function(results){
      var snap = results[0];
      var users = results[1]||[];
      var bills = [];
      snap.forEach(function(doc){ bills.push(doc.data()); });

      // normalize
      var normalized = bills.map(function(b){
        if(b.form && typeof b.form==="string"){ try{b.form=JSON.parse(b.form);}catch(e){b.form={};} }
        if(!b.form) b.form={};
        if(!b.status) b.status="ออกบิลรับของ";
        return b;
      }).filter(function(b){ return b.billNo && b.senderName && b.senderName.trim()!==""; });

      // เรียงล่าสุดก่อน
      normalized.sort(function(a,b){
        var ta = a.createdAt ? new Date(a.createdAt).getTime() : 0;
        var tb2 = b.createdAt ? new Date(b.createdAt).getTime() : 0;
        return tb2 - ta;
      });

      BILLS = normalized;
      DRIVERS = users.filter(function(u){ return u.role==="driver"; });
      renderApp();
    }).catch(function(e){
      document.getElementById("app").innerHTML='<div class="loading">❌ โหลดไม่สำเร็จ: '+e.message+'</div>';
    });
  });
}

// ============================================================
// FIX 3: filterBills — รวม date range + tab + logic ค้างข้ามวัน
// ============================================================
function filterBills(tab){
  var range = getDateRange(filterDateMode);

  return BILLS.filter(function(b){
    var st = b.status || "";
    var isActive = ACTIVE_STATUS.indexOf(st) >= 0;
    var isDone   = DONE_TAB_STATUS.indexOf(st) >= 0;

    // --- กรองวันที่ ---
    if(range.from || range.to){
      var ds = billDateStr(b);
      var inRange = (!range.from || ds >= range.from) && (!range.to || ds <= range.to);

      if(tab === "done"){
        // แท็บ done: กรองวันที่เสมอ (ต้องการดูเฉพาะวันที่เลือก)
        if(ds && !inRange) return false;
      } else if(tab === "all"){
        // แท็บ all: กรองวันที่เสมอ
        if(ds && !inRange) return false;
      } else {
        // แท็บ active (pending/branch/driving):
        // ถ้าบิลยัง active อยู่ → โชว์ข้ามวันได้ (ไม่กรองวันที่)
        // ถ้าบิล done แล้ว → กรองวันที่ตามปกติ
        if(!isActive && ds && !inRange) return false;
      }
    }

    // --- กรองตาม tab ---
    if(tab==="pending") return st==="ออกบิลรับของ" || st==="issued" || st==="";
    if(tab==="branch")  return st==="ระหว่างนำส่งสาขา";
    if(tab==="driving") return st==="กำลังวิ่งส่งลูกค้า" || st==="นำส่งใหม่";
    if(tab==="done")    return isDone;
    return true; // all
  });
}

function getHistoryDateRange(){
  var now = new Date();
  var pad = function(n){return String(n).padStart(2,"0");};
  var fmt = function(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());};
  var today = fmt(now);
  if(historyDateMode==="today") return {from:today, to:today};
  if(historyDateMode==="yesterday"){
    var y=new Date(now); y.setDate(y.getDate()-1); var s=fmt(y); return {from:s,to:s};
  }
  if(historyDateMode==="week"){
    var w=new Date(now); w.setDate(w.getDate()-6); return {from:fmt(w),to:today};
  }
  if(historyDateMode==="month"){
    var m=new Date(now); m.setDate(m.getDate()-29); return {from:fmt(m),to:today};
  }
  return {from:"",to:""};
}

function openDispatch(mode){
  var ids=Object.keys(selectedBills);
  if(ids.length===0){ alert("กรุณาเลือกบิลก่อน"); return; }
  dispatchMode=mode;
  document.getElementById("modal-title").textContent = mode==="branch"?"📦 จ่ายให้สาขา":"🚛 จ่ายให้คนรถ";
  document.getElementById("modal-bill-count").textContent="เลือก "+ids.length+" บิล";
  var sel=document.getElementById("modal-target");
  sel.innerHTML="";
  if(mode==="branch"){
    BRANCHES.forEach(function(b){
      var opt=document.createElement("option");
      opt.value=b.id; opt.text=b.label;
      sel.appendChild(opt);
    });
  } else {
    var ub=getUserBranch();
    var drivers=DRIVERS.filter(function(d){
      if(ub==="all") return true;
      var m={bkk:"กรุงเทพ",ptm:"ปทุมธานี",krt:"นครราชสีมา",ssk:"ศรีสะเกษ"};
      return d.branch===m[ub];
    });
    if(drivers.length===0){ alert("ไม่พบคนรถในสาขานี้"); return; }
    drivers.forEach(function(d){
      var opt=document.createElement("option");
      opt.value=d.username; opt.text=d.name+" ("+d.branch+")";
      sel.appendChild(opt);
    });
  }
  document.getElementById("modal-dispatch").classList.add("show");
}

function closeModal(){ document.getElementById("modal-dispatch").classList.remove("show"); }

function confirmDispatch(){
  var ids=Object.keys(selectedBills);
  var target=document.getElementById("modal-target").value;
  var targetText=document.getElementById("modal-target").options[document.getElementById("modal-target").selectedIndex].text;
  var newStatus = dispatchMode==="branch"?"ระหว่างนำส่งสาขา":"กำลังวิ่งส่งลูกค้า";

  var btn=document.getElementById("modal-confirm-btn");
  btn.disabled=true; btn.textContent="กำลังบันทึก...";

  var promises=ids.map(function(id){
    var upd={status:newStatus, updatedAt:new Date().toISOString()};
    if(dispatchMode==="branch"){ upd.targetBranch=target; upd.targetBranchLabel=targetText; }
    else { upd.driver=target; upd.driverName=targetText; }
    return GolodDB.updateBill(id,upd);
  });

  Promise.all(promises).then(function(){
    var dispatchedBills=[];
    ids.forEach(function(id){
      var b=BILLS.find(function(x){return x.billNo===id;});
      if(b){
        b.status=newStatus;
        if(dispatchMode==="branch"){b.targetBranch=target;b.targetBranchLabel=targetText;}
        else{b.driver=target;b.driverName=targetText;}
        dispatchedBills.push(b);
      }
    });
    closeModal();
    btn.disabled=false; btn.textContent="ยืนยัน";
    selectedBills={};
    renderApp();
    // บันทึก dispatch log
    saveDispatchLogNow(dispatchedBills, target, targetText);
    // แสดง modal สรุป
    showSummaryModal(dispatchedBills, target, targetText);
  }).catch(function(e){
    btn.disabled=false; btn.textContent="ยืนยัน";
    alert("❌ เกิดข้อผิดพลาด: "+e.message);
  });
}

// ===== SUMMARY MODAL =====
function saveDispatchLogNow(bills, targetId, targetName){
  var totOrigin=0,totDest=0,totTransfer=0,totCredit=0,totCOD=0,totFreight=0;
  var billSnap = bills.map(function(b){
    var net=parseFloat(b.freightNet||0);
    var cod=parseFloat(b.codTotal||0);
    var pay=b.freightPay||(b.form&&b.form.freightPay)||"origin";
    totFreight+=net; if(cod>0) totCOD+=cod;
    if(pay==="origin") totOrigin+=net;
    else if(pay==="dest") totDest+=net;
    else if(pay==="transfer") totTransfer+=net;
    else if(pay==="credit") totCredit+=net;
    else totOrigin+=net;
    return {
      billNo: b.billNo,
      receiverName: b.receiverName||(b.form&&b.form.receiverName)||"",
      destProv: b.destProv||(b.form&&b.form.destProv)||"",
      destAmphoe: b.destAmphoe||(b.form&&b.form.destAmphoe)||"",
      freightNet: net, codTotal: cod, freightPay: pay
    };
  });
  var log = {
    dispatchAt: new Date().toISOString(),
    dispatchBy: CU ? CU.username : "",
    dispatchByName: CU ? CU.name : "",
    mode: dispatchMode,
    targetId: targetId,
    targetName: targetName,
    billCount: bills.length,
    totalFreight: totFreight,
    totalOrigin: totOrigin,
    totalDest: totDest,
    totalTransfer: totTransfer,
    totalCredit: totCredit,
    totalCOD: totCOD,
    bills: billSnap
  };
  // บันทึกลง Firestore (ไม่ต้องรอ)
  if(typeof GolodDB !== "undefined" && GolodDB.saveDispatchLog) {
    GolodDB.saveDispatchLog(log).catch(function(e){
      console.warn("saveDispatchLog error:", e);
    });
  }
}

function showSummaryModal(bills, driverKey, driverLabel, dispatchAtISO, dispatchByName){
  var _dt = dispatchAtISO ? new Date(dispatchAtISO) : new Date();
  var dateStr = _dt.getDate()+"/"+((_dt.getMonth()+1))+"/"+((_dt.getFullYear())+543);
  var timeStr = String(_dt.getHours()).padStart(2,"0")+":"+String(_dt.getMinutes()).padStart(2,"0");
  var byStr = dispatchByName ? " | ผู้จ่าย: "+dispatchByName : "";

  // คำนวณยอด
  var totalOrigin=0, totalDest=0, totalTransfer=0, totalCredit=0, totalCOD=0, totalFreight=0;
  bills.forEach(function(b){
    var net = parseFloat(b.freightNet||0);
    var cod = parseFloat(b.codTotal||0);
    var pay = b.freightPay||(b.form&&b.form.freightPay)||"origin";
    totalFreight += net;
    if(cod>0) totalCOD += cod;
    if(pay==="origin")   totalOrigin   += net;
    else if(pay==="dest")     totalDest     += net;
    else if(pay==="transfer") totalTransfer += net;
    else if(pay==="credit")   totalCredit   += net;

function closeSummary(){
  document.getElementById("modal-summary").classList.remove("show");
}

var _printing = false;
function printSummary(){
  if(_printing) return; // guard ไม่ให้ trigger ซ้ำ
  _printing = true;
  var pa = document.getElementById("print-area");
  pa.style.display = "block";
  // ใช้ onafterprint แทน setTimeout — รอจนปิด dialog จริงๆ
  function afterPrint(){
    pa.style.display = "none";
    _printing = false;
    window.removeEventListener("afterprint", afterPrint);
  }
  window.addEventListener("afterprint", afterPrint);
  // fallback กรณี afterprint ไม่ trigger (บาง browser)
  setTimeout(function(){
    if(_printing){ pa.style.display = "none"; _printing = false; }
  }, 30000);
  window.print();
}

// ===== STATUS MODAL =====
function openStatusModal(billNo){
  statusTargetBill=billNo;
  var b=BILLS.find(function(x){return x.billNo===billNo;});
  document.getElementById("modal-status-bill").textContent="บิล "+billNo+(b?" — "+(b.destProv||""):"");
  var sel=document.getElementById("modal-status-sel");
  sel.innerHTML="";
  STATUS_LIST.forEach(function(s){
    var opt=document.createElement("option");
    opt.value=s.v; opt.text=s.l;
    if(b&&b.status===s.v) opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=function(){
    document.getElementById("modal-fail-wrap").style.display=sel.value==="ส่งไม่สำเร็จ"?"block":"none";
  };
  document.getElementById("modal-fail-wrap").style.display="none";
  document.getElementById("modal-status-note").value="";
  document.getElementById("modal-status").classList.add("show");
}

function closeStatusModal(){ document.getElementById("modal-status").classList.remove("show"); }

function confirmStatus(){
  var newStatus=document.getElementById("modal-status-sel").value;
  var note=document.getElementById("modal-status-note").value;
  var upd={status:newStatus, updatedAt:new Date().toISOString()};
  if(newStatus==="ส่งไม่สำเร็จ"){
    upd.failReason=document.getElementById("modal-fail-reason").value;
  }
  if(note) upd.note=note;

  GolodDB.updateBill(statusTargetBill,upd).then(function(){
    var b=BILLS.find(function(x){return x.billNo===statusTargetBill;});
    if(b){
      b.status=newStatus;
      if(upd.failReason) b.failReason=upd.failReason;
    }
    closeStatusModal();
    alert("✅ อัปเดตสถานะแล้ว");
    renderApp();
  }).catch(function(e){ alert("❌ "+e.message); });
}
