<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>โกโลด — คนขับ</title>
<script src="session.js"></script>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="golod-firebase.js?v=1779235612"></script>
<script src="golod-storage.js"></script>
<script>try{GolodDB.init();}catch(e){}</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',Arial,sans-serif;background:#f0f4f0;min-height:100vh;font-size:14px;color:#1a1a1a}

/* TOPBAR */
.topbar{background:#0F6E56;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar .title{font-weight:700;font-size:15px;flex:1}
.topbar .driver-name{font-size:11px;opacity:.8;white-space:nowrap}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px}

/* LOGIN */
.login-wrap{max-width:360px;margin:60px auto;padding:0 16px}
.login-card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.login-logo{text-align:center;font-size:32px;margin-bottom:8px}
.login-title{text-align:center;font-weight:700;font-size:16px;color:#0F6E56;margin-bottom:20px}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:12px;transition:border .2s}
.login-card input:focus{outline:none;border-color:#0F6E56}
.btn-login{width:100%;padding:13px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-login:active{background:#0a4f3e}
.login-err{color:#c0392b;font-size:12px;text-align:center;margin-top:8px;min-height:18px}

/* MAIN LIST */
.container{max-width:500px;margin:0 auto;padding:12px}
.section-title{font-size:12px;font-weight:700;color:#0F6E56;padding:8px 4px;letter-spacing:.5px;text-transform:uppercase}
.empty-state{text-align:center;padding:48px 20px;color:#aaa}
.empty-state .ico{font-size:40px;margin-bottom:10px}
.empty-state .msg{font-size:13px}

/* BILL CARD (list) */
.bill-card{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);overflow:hidden;cursor:pointer;transition:transform .1s,box-shadow .1s}
.bill-card:active{transform:scale(.985);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.bill-card-head{padding:12px 14px 8px;display:flex;align-items:flex-start;gap:10px}
.bill-no{font-weight:800;font-size:15px;color:#0F6E56;white-space:nowrap}
.bill-sender{font-size:11px;color:#888;margin-top:1px}
.bill-card-body{padding:0 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:4px 8px}
.bill-field{font-size:12px;color:#444;line-height:1.5}
.bill-field .lbl{color:#999;font-size:10px;display:block}
.bill-field .val{font-weight:600}
.bill-freight{font-size:16px;font-weight:800;color:#854F0B}
.bill-cod{font-size:13px;font-weight:700;color:#c0392b}
.bill-status-strip{height:4px;background:#2471A3}
.bill-status-strip.driving{background:#2471A3}
.bill-status-strip.new{background:#F39C12}

/* DETAIL PANEL (bottom sheet style) */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100}
.overlay.show{display:block}
.detail-panel{position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;z-index:101;max-height:92vh;overflow-y:auto;transition:transform .25s cubic-bezier(.4,0,.2,1);transform:translateY(100%)}
.detail-panel.show{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.panel-head{padding:12px 16px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px}
.panel-billno{font-weight:800;font-size:17px;color:#0F6E56}
.panel-close{margin-left:auto;background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.panel-body{padding:14px 16px}

/* INFO ROWS */
.info-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f8f8f8}
.info-row:last-child{border-bottom:none}
.info-icon{font-size:14px;width:20px;flex-shrink:0;margin-top:1px}
.info-content{flex:1}
.info-label{font-size:10px;color:#aaa;margin-bottom:1px}
.info-val{font-size:13px;font-weight:600;color:#1a1a1a}
.info-val.green{color:#0F6E56}
.info-val.red{color:#c0392b}
.info-val.orange{color:#854F0B}

/* ACTION SECTION */
.action-section{margin-top:16px}
.action-title{font-size:11px;font-weight:700;color:#555;margin-bottom:10px;letter-spacing:.3px}

/* UPLOAD BOXES */
.upload-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.upload-box{aspect-ratio:1;border:2px dashed #d0ede5;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:#f8fffe;transition:border-color .2s}
.upload-box:active{border-color:#0F6E56}
.upload-box .ico{font-size:22px;margin-bottom:3px}
.upload-box .lbl{font-size:9px;color:#999;font-weight:600;text-align:center;line-height:1.3}
.upload-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.upload-box .done-badge{position:absolute;top:4px;right:4px;background:#0F6E56;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center}
.upload-box input[type=file]{display:none}

/* SIGNATURE PAD */
.sig-wrap{margin-bottom:14px}
.sig-canvas{width:100%;height:140px;border:2px dashed #d0ede5;border-radius:10px;background:#fff;touch-action:none;display:block}
.sig-canvas.has-sig{border-color:#0F6E56;border-style:solid}
.sig-ctrl{display:flex;gap:6px;margin-top:6px}
.btn-sig-clear{padding:6px 14px;border:1px solid #ddd;background:#f8f8f8;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}

/* STATUS BUTTONS */
.status-section{margin-top:4px}
.fail-reasons{background:#fff5f5;border:1px solid #fdd;border-radius:10px;padding:10px 12px;margin-bottom:10px}
.fail-reasons .fl{font-size:11px;color:#c0392b;font-weight:700;margin-bottom:8px}
.fail-radio{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer}
.fail-radio input{accent-color:#c0392b;width:16px;height:16px}
.fail-radio span{font-size:13px;color:#333}

.btn-success{width:100%;padding:15px;background:#0F6E56;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn-success:active{background:#0a4f3e}
.btn-fail{width:100%;padding:13px;background:#fff;color:#c0392b;border:2px solid #c0392b;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn-fail:active{background:#fff5f5}
.btn-fail.expanded{background:#c0392b;color:#fff}

/* LOADING / UPLOADING */
.uploading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fff}
.uploading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-msg{font-size:13px;font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.green{background:#0F6E56}
.toast.red{background:#c0392b}

.loading-state{text-align:center;padding:48px 20px;color:#aaa;font-size:13px}
.spin-inline{display:inline-block;animation:spin .8s linear infinite;font-size:20px}
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">🚛</div>
      <div class="login-title">โกโลด ทรานสปอร์ต<br><span style="font-size:13px;font-weight:400;color:#888">หน้าคนขับ</span></div>
      <input type="text" id="inp-user" placeholder="Username" autocomplete="username">
      <input type="password" id="inp-pass" placeholder="Password" autocomplete="current-password">
      <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="main-screen" style="display:none">
  <div class="topbar">
    <span class="title">🚛 งานของฉัน</span>
    <span class="driver-name" id="driver-label"></span>
    <button class="btn-logout" onclick="doLogout()">ออก</button>
  </div>
  <div class="container">
    <div id="bill-list"><div class="loading-state"><span class="spin-inline">⏳</span><br><br>กำลังโหลดงาน...</div></div>
  </div>
</div>

<!-- Detail panel overlay -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="panel-handle"></div>
  <div class="panel-head">
    <div>
      <div class="panel-billno" id="p-billno">—</div>
      <div style="font-size:11px;color:#888;margin-top:2px" id="p-sender">—</div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <!-- receiver info -->
    <div id="p-info"></div>

    <!-- upload section -->
    <div class="action-section">
      <div class="action-title">📎 เอกสาร / หลักฐาน</div>
      <div class="upload-grid">
        <!-- รูปถ่าย -->
        <div class="upload-box" onclick="triggerUpload('photo')">
          <div class="ico">📷</div>
          <div class="lbl">ถ่ายรูป<br>สินค้า</div>
          <div class="done-badge" id="badge-photo" style="display:none">✓</div>
          <img id="prev-photo" style="display:none">
          <input type="file" id="file-photo" accept="image/*" capture="environment" onchange="handleFile('photo',this)">
        </div>
        <!-- สลิปโอน -->
        <div class="upload-box" onclick="triggerUpload('slip')">
          <div class="ico">🧾</div>
          <div class="lbl">สลิป<br>โอนเงิน</div>
          <div class="done-badge" id="badge-slip" style="display:none">✓</div>
          <img id="prev-slip" style="display:none">
          <input type="file" id="file-slip" accept="image/*" capture="environment" onchange="handleFile('slip',this)">
        </div>
        <!-- เพิ่มเติม -->
        <div class="upload-box" onclick="triggerUpload('extra')">
          <div class="ico">📁</div>
          <div class="lbl">รูปอื่น<br>เพิ่มเติม</div>
          <div class="done-badge" id="badge-extra" style="display:none">✓</div>
          <img id="prev-extra" style="display:none">
          <input type="file" id="file-extra" accept="image/*" onchange="handleFile('extra',this)">
        </div>
      </div>

      <!-- Signature pad -->
      <div class="sig-wrap">
        <div class="action-title" style="margin-bottom:6px">✍️ ลายเซ็นผู้รับ</div>
        <canvas class="sig-canvas" id="sig-canvas" width="800" height="280"></canvas>
        <div class="sig-ctrl">
          <button class="btn-sig-clear" onclick="clearSig()">🗑 ล้างลายเซ็น</button>
          <span id="sig-status" style="font-size:11px;color:#aaa;line-height:2.2">ยังไม่มีลายเซ็น</span>
        </div>
      </div>

      <!-- Status buttons -->
      <div class="status-section">
        <div class="action-title">📋 ผลการส่ง</div>

        <!-- ส่งไม่สำเร็จ reasons (toggle) -->
        <div class="fail-reasons" id="fail-reasons" style="display:none">
          <div class="fl">⚠️ เลือกสาเหตุที่ส่งไม่สำเร็จ</div>
          <label class="fail-radio"><input type="radio" name="fail" value="ติดต่อไม่ได้" checked><span>ติดต่อไม่ได้</span></label>
          <label class="fail-radio"><input type="radio" name="fail" value="ลูกค้าหยุด"><span>ลูกค้าหยุด</span></label>
          <label class="fail-radio"><input type="radio" name="fail" value="ลูกค้าไม่รับของ"><span>ลูกค้าไม่รับของ</span></label>
          <label class="fail-radio"><input type="radio" name="fail" value="ของชำรุด"><span>ของชำรุด</span></label>
        </div>

        <button class="btn-success" id="btn-success" onclick="submitStatus('success')">
          ✅ ส่งสำเร็จ
        </button>
        <button class="btn-fail" id="btn-fail" onclick="toggleFail()">
          ❌ ส่งไม่สำเร็จ
        </button>
        <div id="btn-fail-confirm-wrap" style="display:none;margin-top:8px">
          <button class="btn-fail" style="background:#c0392b;color:#fff;border-color:#c0392b;width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none" onclick="submitStatus('fail')">
            ยืนยัน — ส่งไม่สำเร็จ
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Uploading overlay -->
<div class="uploading-overlay" id="uploading-overlay">
  <div class="spinner"></div>
  <div class="upload-msg" id="uploading-msg">กำลังอัปโหลด...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
var CU = null;          // current user session
var BILLS = [];         // bills assigned to this driver
var currentBill = null; // bill open in panel
var uploadedUrls = {};  // {photo: url, slip: url, extra: url}
var sigHasData = false;
var failExpanded = false;

// ===== SESSION / LOGIN =====
function initApp(){
  var s = typeof GolodSession !== "undefined" ? GolodSession.get() : null;
  if(s && s.role === "driver"){
    CU = s;
    showMain();
  } else {
    // มี session แต่ไม่ใช่ driver → ล้างแล้ว login ใหม่ (ไม่ redirect ออก)
    if(s && s.role !== "driver"){
      try{ GolodSession.clear(); }catch(e){}
    }
    showLogin();
  }
}

function showLogin(){
  document.getElementById("login-screen").style.display = "";
  document.getElementById("main-screen").style.display = "none";
  setTimeout(function(){ document.getElementById("inp-user").focus(); }, 100);
}

function showMain(){
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("main-screen").style.display = "";
  document.getElementById("driver-label").textContent = CU.name || CU.username;
  loadBills();
}

function doLogin(){
  var u = (document.getElementById("inp-user").value||"").trim();
  var p = (document.getElementById("inp-pass").value||"").trim();
  var errEl = document.getElementById("login-err");
  if(!u||!p){ errEl.textContent = "กรุณากรอก username และ password"; return; }
  errEl.textContent = "กำลังตรวจสอบ...";

  function tryLogin(attempt){
    var db;
    try{ db = firebase.firestore(); }catch(e){
      if(attempt < 10){ setTimeout(function(){ tryLogin(attempt+1); }, 400); }
      else { errEl.textContent = "Firestore ไม่พร้อม กรุณา reload"; }
      return;
    }
    db.collection("users").doc(u).get().then(function(doc){
      if(doc.exists && doc.data().username) return doc.data();
      return db.collection("users").where("username","==",u).limit(1).get()
        .then(function(snap){ return snap.empty ? null : snap.docs[0].data(); });
    }).then(function(found){
      if(!found){ errEl.textContent = 'ไม่พบ username "'+u+'" ในระบบ'; return; }
      if(found.password !== p){ errEl.textContent = "password ไม่ถูกต้อง"; return; }
      if(found.role !== "driver"){ errEl.textContent = "บัญชีนี้ไม่ใช่คนขับ (role: "+(found.role||"-")+")"; return; }
      if(found.active === false){ errEl.textContent = "บัญชีนี้ถูกระงับ"; return; }
      var sess = {username:found.username||u, name:found.name||u, role:"driver", branch:found.branch||""};
      try{ GolodSession.set(sess); }catch(e){}
      CU = sess;
      errEl.textContent = "";
      showMain();
    }).catch(function(e){ errEl.textContent = "ผิดพลาด: "+e.message; });
  }
  tryLogin(0);
}
function doLogout(){
  if(!confirm("ออกจากระบบ?")) return;
  if(typeof GolodSession !== "undefined") GolodSession.clear();
  CU = null; BILLS = [];
  showLogin();
}

// Enter key on login
document.addEventListener("keydown", function(e){
  if(e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") doLogin();
});

// ===== LOAD BILLS =====
function loadBills(){
  document.getElementById("bill-list").innerHTML = '<div class="loading-state"><span class="spin-inline">⏳</span><br><br>กำลังโหลดงาน...</div>';
  GolodDB.ready(function(){
    GolodDB.getBillsNew(500).then(function(bills){
      // เฉพาะบิลที่จ่ายให้คนขับคนนี้ และสถานะที่ยังต้องทำงาน
      var ACTIVE = ["กำลังวิ่งส่งลูกค้า","นำส่งใหม่"];
      BILLS = bills.filter(function(b){
        // match username ตรงๆ หรือ driverName ที่อาจมี " (สาขา)" ต่อท้าย
        var driverMatch = b.driver === CU.username
          || b.driverName === CU.name
          || (b.driverName && CU.name && b.driverName.indexOf(CU.name) === 0);
        return driverMatch && ACTIVE.indexOf(b.status) >= 0;
      });
      renderBillList();
    }).catch(function(e){
      document.getElementById("bill-list").innerHTML =
        '<div class="empty-state"><div class="ico">❌</div><div class="msg">โหลดไม่สำเร็จ: '+e.message+'</div></div>';
    });
  });
}

// ===== RENDER LIST =====
var PAY_LABEL = {origin:"ต้นทาง",dest:"ปลายทาง",transfer:"โอน",credit:"เครดิต"};

function renderBillList(){
  var el = document.getElementById("bill-list");
  if(BILLS.length === 0){
    el.innerHTML = '<div class="empty-state"><div class="ico">✅</div><div class="msg">ไม่มีงานค้างในขณะนี้<br><br><button onclick="loadBills()" style="padding:8px 18px;background:#0F6E56;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">🔄 รีเฟรช</button></div></div>';
    return;
  }

  var html = '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 2px 8px">'
    +'<span class="section-title" style="padding:0">งานรอส่ง '+BILLS.length+' รายการ</span>'
    +'<button onclick="loadBills()" style="padding:5px 12px;background:#e8f5f0;color:#0F6E56;border:1px solid #d0ede5;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600">🔄 รีเฟรช</button>'
    +'</div>';

  BILLS.forEach(function(b){
    var form = (typeof b.form === "object" && b.form) ? b.form : {};
    var receiver = b.receiverName || form.receiverName || "—";
    var amphoe   = b.destAmphoe  || form.destAmphoe  || "";
    var prov     = b.destProv    || form.destProv    || "—";
    var sender   = b.senderName  || form.senderName  || "—";
    var freight  = parseFloat(b.freightNet  || 0);
    var cod      = parseFloat(b.codTotal    || 0);
    var pay      = PAY_LABEL[b.freightPay] || b.freightPay || "ต้นทาง";
    var isNew    = b.status === "นำส่งใหม่";

    html += '<div class="bill-card" onclick="openPanel(\''+b.billNo+'\')">'
      +'<div class="bill-status-strip '+(isNew?"new":"driving")+'"></div>'
      +'<div class="bill-card-head">'
        +'<div style="flex:1">'
          +'<div class="bill-no">'+b.billNo+'</div>'
          +'<div class="bill-sender">📦 '+sender+'</div>'
        +'</div>'
        +(isNew?'<span style="font-size:10px;padding:2px 8px;background:#fff3e0;color:#E67E22;border-radius:10px;font-weight:700">ส่งใหม่</span>':'')
      +'</div>'
      +'<div class="bill-card-body">'
        +'<div class="bill-field"><span class="lbl">ผู้รับ</span><span class="val">'+receiver+'</span></div>'
        +'<div class="bill-field"><span class="lbl">อำเภอ · จังหวัด</span><span class="val">'+(amphoe?amphoe+"·":"")+prov+'</span></div>'
        +'<div class="bill-field"><span class="lbl">ค่าขนส่ง ('+pay+')</span><span class="val bill-freight">'+(freight>0?freight.toLocaleString("th-TH")+" ฿":"—")+'</span></div>'
        +'<div class="bill-field"><span class="lbl">COD</span><span class="val bill-cod">'+(cod>0?cod.toLocaleString("th-TH")+" ฿":"—")+'</span></div>'
      +'</div>'
    +'</div>';
  });

  el.innerHTML = html;
}

// ===== PANEL =====
function openPanel(billNo){
  var b = BILLS.find(function(x){ return x.billNo === billNo; });
  if(!b) return;
  currentBill = b;
  uploadedUrls = {};
  sigHasData = false;
  failExpanded = false;

  var form = (typeof b.form === "object" && b.form) ? b.form : {};
  var receiver = b.receiverName || form.receiverName || "—";
  var phone    = b.receiverPhone|| form.receiverPhone|| "—";
  var addr     = b.receiverAddr || form.receiverAddr || "";
  var amphoe   = b.destAmphoe   || form.destAmphoe  || "";
  var prov     = b.destProv     || form.destProv    || "—";
  var sender   = b.senderName   || form.senderName  || "—";
  var freight  = parseFloat(b.freightNet  || 0);
  var cod      = parseFloat(b.codTotal    || 0);
  var pay      = PAY_LABEL[b.freightPay] || b.freightPay || "ต้นทาง";
  var note     = b.note || form.note || "";

  document.getElementById("p-billno").textContent = b.billNo;
  document.getElementById("p-sender").textContent = "📦 " + sender;

  document.getElementById("p-info").innerHTML =
    '<div class="info-row"><div class="info-icon">👤</div><div class="info-content"><div class="info-label">ผู้รับ</div><div class="info-val">'+receiver+'</div></div></div>'
   +'<div class="info-row"><div class="info-icon">📞</div><div class="info-content"><div class="info-label">โทรศัพท์</div><div class="info-val"><a href="tel:'+phone+'" style="color:#0F6E56;text-decoration:none">'+phone+'</a></div></div></div>'
   +(addr?'<div class="info-row"><div class="info-icon">🏠</div><div class="info-content"><div class="info-label">ที่อยู่</div><div class="info-val">'+addr+'</div></div></div>':'')
   +'<div class="info-row"><div class="info-icon">📍</div><div class="info-content"><div class="info-label">อำเภอ · จังหวัด</div><div class="info-val">'+(amphoe?amphoe+" · ":"")+prov+'</div></div></div>'
   +'<div class="info-row"><div class="info-icon">💰</div><div class="info-content"><div class="info-label">ค่าขนส่ง ('+pay+')</div><div class="info-val orange">'+(freight>0?freight.toLocaleString("th-TH")+" ฿":"—")+'</div></div></div>'
   +(cod>0?'<div class="info-row"><div class="info-icon">🔴</div><div class="info-content"><div class="info-label">COD</div><div class="info-val red">'+cod.toLocaleString("th-TH")+" ฿"+'</div></div></div>':'')
   +(note?'<div class="info-row"><div class="info-icon">📝</div><div class="info-content"><div class="info-label">หมายเหตุ</div><div class="info-val">'+note+'</div></div></div>':'');

  // reset uploads
  ["photo","slip","extra"].forEach(function(k){
    document.getElementById("prev-"+k).style.display = "none";
    document.getElementById("badge-"+k).style.display = "none";
    document.getElementById("file-"+k).value = "";
  });

  // reset sig
  clearSig();
  document.getElementById("sig-status").textContent = "ยังไม่มีลายเซ็น";

  // reset fail
  document.getElementById("fail-reasons").style.display = "none";
  document.getElementById("btn-fail-confirm-wrap").style.display = "none";
  document.getElementById("btn-fail").classList.remove("expanded");
  document.getElementById("btn-fail").textContent = "❌ ส่งไม่สำเร็จ";

  // show panel
  document.getElementById("overlay").classList.add("show");
  setTimeout(function(){ document.getElementById("detail-panel").classList.add("show"); }, 10);
  document.body.style.overflow = "hidden";

  // init signature pad after panel visible
  setTimeout(initSig, 300);
}

function closePanel(){
  document.getElementById("detail-panel").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow = "";
  setTimeout(function(){ currentBill = null; }, 300);
}

// ===== SIGNATURE PAD =====
var sigCtx = null;
var sigDrawing = false;
var sigLastX = 0, sigLastY = 0;

function initSig(){
  var canvas = document.getElementById("sig-canvas");
  sigCtx = canvas.getContext("2d");
  // resize canvas to actual display size
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * (window.devicePixelRatio||1);
  canvas.height = rect.height * (window.devicePixelRatio||1);
  sigCtx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  sigCtx.strokeStyle = "#0F6E56";
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = "round";
  sigCtx.lineJoin = "round";

  function getPos(e){
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return {x: src.clientX - r.left, y: src.clientY - r.top};
  }

  canvas.onmousedown = canvas.ontouchstart = function(e){
    e.preventDefault();
    sigDrawing = true;
    var p = getPos(e);
    sigLastX = p.x; sigLastY = p.y;
    sigCtx.beginPath();
    sigCtx.arc(p.x, p.y, 1.2, 0, Math.PI*2);
    sigCtx.fill();
  };
  canvas.onmousemove = canvas.ontouchmove = function(e){
    e.preventDefault();
    if(!sigDrawing) return;
    var p = getPos(e);
    sigCtx.beginPath();
    sigCtx.moveTo(sigLastX, sigLastY);
    sigCtx.lineTo(p.x, p.y);
    sigCtx.stroke();
    sigLastX = p.x; sigLastY = p.y;
    sigHasData = true;
    canvas.classList.add("has-sig");
    document.getElementById("sig-status").textContent = "✅ มีลายเซ็น";
    document.getElementById("sig-status").style.color = "#0F6E56";
  };
  canvas.onmouseup = canvas.ontouchend = function(){ sigDrawing = false; };
}

function clearSig(){
  var canvas = document.getElementById("sig-canvas");
  if(sigCtx) sigCtx.clearRect(0, 0, canvas.width, canvas.height);
  sigHasData = false;
  canvas.classList.remove("has-sig");
  document.getElementById("sig-status").textContent = "ยังไม่มีลายเซ็น";
  document.getElementById("sig-status").style.color = "#aaa";
}

function getSigBlob(){
  return new Promise(function(resolve){
    if(!sigHasData){ resolve(null); return; }
    var canvas = document.getElementById("sig-canvas");
    canvas.toBlob(function(blob){ resolve(blob); }, "image/png", 0.85);
  });
}

// ===== FILE UPLOAD =====
function triggerUpload(slot){
  document.getElementById("file-"+slot).click();
}

function handleFile(slot, input){
  var file = input.files[0];
  if(!file) return;
  // preview
  var reader = new FileReader();
  reader.onload = function(e){
    var img = document.getElementById("prev-"+slot);
    img.src = e.target.result;
    img.style.display = "block";
    document.getElementById("badge-"+slot).style.display = "flex";
  };
  reader.readAsDataURL(file);
  // stash file reference
  uploadedUrls["_file_"+slot] = file;
}

// ===== FAIL TOGGLE =====
function toggleFail(){
  failExpanded = !failExpanded;
  document.getElementById("fail-reasons").style.display = failExpanded ? "block" : "none";
  document.getElementById("btn-fail-confirm-wrap").style.display = failExpanded ? "block" : "none";
  var btn = document.getElementById("btn-fail");
  if(failExpanded){
    btn.classList.add("expanded");
    btn.textContent = "▲ ยกเลิก";
  } else {
    btn.classList.remove("expanded");
    btn.textContent = "❌ ส่งไม่สำเร็จ";
  }
}

// ===== SUBMIT =====
function submitStatus(result){
  if(!currentBill) return;

  var billNo = currentBill.billNo;

  // gather fail reason
  var failReason = "";
  if(result === "fail"){
    var radios = document.getElementsByName("fail");
    for(var i=0;i<radios.length;i++){
      if(radios[i].checked){ failReason = radios[i].value; break; }
    }
    if(!failReason){ showToast("กรุณาเลือกสาเหตุ","red"); return; }
  }

  showUploading("กำลังอัปโหลดรูปภาพ...");

  // collect upload tasks
  var tasks = [];

  // photo / slip / extra
  ["photo","slip","extra"].forEach(function(slot){
    var file = uploadedUrls["_file_"+slot];
    if(file){
      tasks.push(
        GolodStorage.uploadSlip(billNo, file, slot).then(function(url){
          uploadedUrls[slot] = url;
        })
      );
    }
  });

  // signature
  tasks.push(
    getSigBlob().then(function(blob){
      if(!blob) return;
      setUploadingMsg("กำลังอัปโหลดลายเซ็น...");
      var sigFile = new File([blob], "sig.png", {type:"image/png"});
      return GolodStorage.uploadSlip(billNo, sigFile, "signature").then(function(url){
        uploadedUrls["signature"] = url;
      });
    })
  );

  Promise.all(tasks).then(function(){
    setUploadingMsg("กำลังบันทึกสถานะ...");

    var now = new Date().toISOString();
    var newStatus = result === "success" ? "ส่งสำเร็จ" : "ส่งไม่สำเร็จ";

    var upd = {
      status: newStatus,
      deliveredAt: now,
      updatedAt: now
    };
    if(uploadedUrls.photo)     upd.photoUrl     = uploadedUrls.photo;
    if(uploadedUrls.slip)      upd.slipUrl      = uploadedUrls.slip;
    if(uploadedUrls.extra)     upd.extraUrl     = uploadedUrls.extra;
    if(uploadedUrls.signature) upd.signatureUrl = uploadedUrls.signature;
    if(failReason)             upd.failReason   = failReason;

    return GolodDB.updateBill(billNo, upd);
  }).then(function(){
    hideUploading();
    closePanel();
    // remove from local list
    BILLS = BILLS.filter(function(b){ return b.billNo !== billNo; });
    renderBillList();
    var msg = result === "success" ? "✅ บันทึกส่งสำเร็จแล้ว!" : "❌ บันทึกส่งไม่สำเร็จแล้ว";
    var clr = result === "success" ? "green" : "red";
    showToast(msg, clr);
  }).catch(function(e){
    hideUploading();
    showToast("เกิดข้อผิดพลาด: "+e.message, "red");
  });
}

// ===== UI HELPERS =====
function showUploading(msg){
  document.getElementById("uploading-msg").textContent = msg||"กำลังอัปโหลด...";
  document.getElementById("uploading-overlay").classList.add("show");
}
function setUploadingMsg(msg){
  document.getElementById("uploading-msg").textContent = msg;
}
function hideUploading(){
  document.getElementById("uploading-overlay").classList.remove("show");
}

var _toastTimer = null;
function showToast(msg, type){
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (type?" "+type:"");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){
    el.classList.remove("show");
  }, 2800);
}

// ===== INIT =====
function startApp(){
  if(typeof GolodDB !== "undefined" && typeof GolodDB.ready === "function"){
    try{ GolodDB.init(); }catch(e){}
    GolodDB.ready(initApp);
  } else {
    setTimeout(startApp, 300);
  }
}
startApp();
</script>
