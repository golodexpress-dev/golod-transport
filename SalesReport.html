<script>

// ===== ZONE DEFINITION =====
var ZONE_MAP = {
  BKK:    {label:"BKK",    color:"bkk",     clr:"#c0392b", provinces:["กรุงเทพมหานคร","ปทุมธานี","นนทบุรี","สมุทรปราการ","สมุทรสาคร"]},
  West:   {label:"West",   color:"west",    clr:"#d35400", provinces:["ราชบุรี","นครปฐม","สุพรรณบุรี","กาญจนบุรี"]},
  South:  {label:"South",  color:"south",   clr:"#27ae60", provinces:["สมุทรสงคราม","เพชรบุรี","ประจวบคีรีขันธ์","ชุมพร","ระนอง","สุราษฎร์ธานี","นครศรีธรรมราช","กระบี่","พังงา","ภูเก็ต","ตรัง","พัทลุง","สตูล","สงขลา","ปัตตานี","ยะลา","นราธิวาส"]},
  North:  {label:"North",  color:"north",   clr:"#2471a3", provinces:["นครสวรรค์","กำแพงเพชร","อุทัยธานี","ตาก","พิษณุโลก","พิจิตร","อุตรดิตถ์","สุโขทัย","เพชรบูรณ์","ลำปาง","ลำพูน","เชียงใหม่","แพร่","น่าน","แม่ฮ่องสอน","เชียงราย","พะเยา"]},
  East:   {label:"East",   color:"east",    clr:"#8e44ad", provinces:["ชลบุรี","ระยอง","จันทบุรี","ตราด","สระแก้ว","ฉะเชิงเทรา","นครนายก","ปราจีนบุรี"]},
  Central:{label:"Central",color:"central", clr:"#0f6e56", provinces:["ชัยนาท","ลพบุรี","สระบุรี","อ่างทอง","สิงห์บุรี","พระนครศรีอยุธยา"]},
  Korat:  {label:"Korat",  color:"korat",   clr:"#b7950b", provinces:["นครราชสีมา"]},
  LEsan:  {label:"LEsan",  color:"lesan",   clr:"#a93226", provinces:["สุรินทร์","ศรีสะเกษ","อุบลราชธานี","ยโสธร","อำนาจเจริญ"]},
  Esan:   {label:"Esan",   color:"esan",    clr:"#1a5276", provinces:["ชัยภูมิ","หนองบัวลำภู","อุดรธานี","หนองคาย","ขอนแก่น","บึงกาฬ","สกลนคร","มหาสารคาม","ร้อยเอ็ด","กาฬสินธุ์","มุกดาหาร","นครพนม"]}
};

var BRANCH_MAP = {bkk:"กรุงเทพ", ptm:"ปทุมธานี", krt:"นครราชสีมา", ssk:"ศรีสะเกษ"};
var PAY_TYPES = [
  {key:"origin",   label:"ต้นทาง",   color:"#1D9E75"},
  {key:"dest",     label:"ปลายทาง",  color:"#E67E22"},
  {key:"transfer", label:"โอน",      color:"#2471A3"},
  {key:"credit",   label:"เครดิต",   color:"#8E44AD"},
  {key:"cod",      label:"COD",      color:"#C0392B"}
];
var PAY_LABEL = {origin:"ต้นทาง", dest:"ปลายทาง", transfer:"โอน", credit:"เครดิต", cod:"COD"};

function getZone(prov, amphoe) {
  prov = prov||""; amphoe = amphoe||"";
  if(prov==="เลย"){
    return ["ด่านซ้าย","นาแห้ว","ภูเรือ"].indexOf(amphoe)>=0 ? "North" : "Esan";
  }
  if(prov==="บุรีรัมย์"){
    return ["บ้านใหม่ไชยพจน์","พุทไธสง","นาโพธิ์"].indexOf(amphoe)>=0 ? "Esan" : "LEsan";
  }
  if(prov==="เพชรบูรณ์"){
    return amphoe==="น้ำหนาว" ? "Esan" : "North";
  }
  for(var z in ZONE_MAP){
    if(ZONE_MAP[z].provinces.indexOf(prov)>=0) return z;
  }
  return "Other";
}

function getBranch(b){
  if(b.branch) return b.branch;
  var cc=(b.clerkCode||"").toUpperCase();
  if(cc==="KA") return "krt";
  if(cc==="SA") return "ssk";
  if(cc==="PH") return "ptm";
  return "bkk";
}

function fmt(n){ return (Math.round(n)||0).toLocaleString("th-TH"); }
function fmtDate(d){ return d.getDate()+"/"+(d.getMonth()+1)+"/"+(d.getFullYear()+543); }

function parseBillDate(b){
  // ใช้ b.date ก่อนเสมอ เพราะ createdAt เป็น UTC ทำให้วันที่คลาดเคลื่อน +7
  var v=b.date||b.createdAt||"";
  if(!v) return null;
  if(typeof v==="string"){
    // ISO format: "2026-05-20" หรือ "2026-05-20T17:30:00.000Z"
    if(v.indexOf("-")===4 && v.length>=10){
      var parts=v.substring(0,10).split("-");
      // parse เป็น local date (ไม่ผ่าน UTC)
      return new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    }
    // Thai format: "20/5/2569" หรือ "20/5/2026"
    var p=v.split("/");
    if(p.length>=3){
      var y=parseInt(p[2]); if(y>2400) y-=543;
      return new Date(y,parseInt(p[1])-1,parseInt(p[0]));
    }
    // fallback
    var d1=new Date(v);
    if(!isNaN(d1.getTime())) return d1;
  }
  return null;
}

function fmtBillDate(b){
  var d=parseBillDate(b);
  if(!d) return "—";
  return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
}

function filterByDate(bills, from, to){
  return bills.filter(function(b){
    var d=parseBillDate(b);
    if(!d) return false;
    var ds=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    return ds>=from && ds<=to;
  });
}

function getBillPay(b){
  return b.freightPay||(b.form&&typeof b.form==="object"?b.form.freightPay:null)||"origin";
}
function getBillProv(b){
  return b.destProv||(b.form&&typeof b.form==="object"?b.form.destProv:null)||"";
}
function getBillAmphoe(b){
  return b.destAmphoe||(b.form&&typeof b.form==="object"?b.form.destAmphoe:null)||"";
}

function calcSummary(bills){
  var result={total:0,bills:0,byPay:{origin:0,dest:0,transfer:0,credit:0,cod:0},
    byZone:{},byBranch:{bkk:0,ptm:0,krt:0,ssk:0},zoneBills:{}};
  bills.forEach(function(b){
    var net=parseFloat(b.freightNet||0);
    var cod=parseFloat(b.codTotal||0);
    var pay=getBillPay(b);
    var prov=getBillProv(b);
    var amphoe=getBillAmphoe(b);
    var zone=getZone(prov,amphoe);
    var branch=getBranch(b);

    result.total+=net; result.bills++;
    if(result.byPay[pay]!==undefined) result.byPay[pay]+=net;
    else result.byPay.origin+=net;
    if(cod>0) result.byPay.cod+=cod;

    if(!result.byZone[zone])    result.byZone[zone]={total:0,bills:0,byPay:{origin:0,dest:0,transfer:0,credit:0}};
    if(!result.zoneBills[zone]) result.zoneBills[zone]=[];
    result.byZone[zone].total+=net; result.byZone[zone].bills++;
    if(result.byZone[zone].byPay[pay]!==undefined) result.byZone[zone].byPay[pay]+=net;
    result.zoneBills[zone].push(b);

    if(result.byBranch[branch]!==undefined) result.byBranch[branch]+=net;
    else result.byBranch.bkk+=net;
  });
  return result;
}

// ===== ZONE MODAL =====
var _currentZoneBills = [];

function openZoneModal(zone, zoneBills){
  if(!zoneBills||zoneBills.length===0) return;
  _currentZoneBills = zoneBills;
  var zd = ZONE_MAP[zone]||{label:zone, clr:"#555"};

  document.getElementById("zone-modal-title").textContent = "Zone "+zone+" — รายการบิล";
  document.getElementById("zone-modal-sub").textContent = zoneBills.length+" บิล";

  // summary boxes
  var totalNet=0, byPay={origin:0,dest:0,transfer:0,credit:0};
  zoneBills.forEach(function(b){
    var net=parseFloat(b.freightNet||0);
    var pay=getBillPay(b);
    totalNet+=net;
    if(byPay[pay]!==undefined) byPay[pay]+=net;
    else byPay.origin+=net;
  });
  var sumHTML = PAY_TYPES.filter(function(p){return p.key!=="cod";}).map(function(p){
    return '<div class="zs-box"><div class="zl">'+p.label+'</div><div class="zv" style="color:'+p.color+'">'+fmt(byPay[p.key]||0)+'</div></div>';
  }).join("");
  sumHTML += '<div class="zs-box" style="background:#f0faf5;border-color:#0F6E56"><div class="zl">รวมทั้งหมด</div><div class="zv">'+fmt(totalNet)+'</div></div>';
  document.getElementById("zone-modal-summary").innerHTML = sumHTML;

  // rows
  var rows = zoneBills.map(function(b, i){
    var net    = parseFloat(b.freightNet||0);
    var pay    = getBillPay(b);
    var prov   = getBillProv(b);
    var amphoe = getBillAmphoe(b);
    var recv   = b.receiverName||(b.form&&b.form.receiverName)||"";
    return '<tr style="cursor:pointer" onclick="openBillPreview('+i+')" title="คลิกดูพรีวิวบิล">'
      +'<td style="text-align:left;color:#aaa;font-size:11px">'+(i+1)+'</td>'
      +'<td style="text-align:left;font-weight:700;white-space:nowrap;color:#0F6E56;text-decoration:underline">'+b.billNo+'</td>'
      +'<td style="text-align:left;color:#888;white-space:nowrap">'+fmtBillDate(b)+'</td>'
      +'<td style="text-align:left">'+recv+'</td>'
      +'<td style="text-align:left;white-space:nowrap">'+amphoe+'·'+prov+'</td>'
      +'<td><span style="font-size:10px;padding:2px 6px;border-radius:8px;background:#f0f0f0;color:#555">'+(PAY_LABEL[pay]||pay)+'</span></td>'
      +'<td style="font-weight:700;color:#0F6E56">'+fmt(net)+'</td>'
      +'</tr>';
  }).join("");

  var foot = '<tr style="background:#f0faf5;font-weight:700;border-top:2px solid #d0ede5">'
    +'<td colspan="6" style="text-align:left">รวม '+zoneBills.length+' บิล</td>'
    +'<td>'+fmt(totalNet)+'</td>'
    +'</tr>';

  document.getElementById("zone-modal-rows").innerHTML = rows;
  document.getElementById("zone-modal-foot").innerHTML = foot;
  document.getElementById("zone-modal-bg").classList.add("show");
  document.getElementById("zone-modal").scrollTop = 0;
}

function closeZoneModal(e){
  if(!e || e.target===document.getElementById("zone-modal-bg")){
    document.getElementById("zone-modal-bg").classList.remove("show");
  }
}

// ===== พรีวิวบิล (80mm) =====
function bahtTextTH(n){
  n=Math.round((parseFloat(n)||0)*100)/100;
  var num=["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
  var pos=["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
  function conv(s){
    var t="",L=s.length;
    for(var i=0;i<L;i++){
      var d=parseInt(s[i]),p=L-i-1;
      if(d===0)continue;
      if(p===1&&d===1)t+="สิบ";
      else if(p===1&&d===2)t+="ยี่สิบ";
      else if(p===0&&d===1&&L>1)t+="เอ็ด";
      else t+=num[d]+pos[p];
    }
    return t;
  }
  var ba=Math.floor(n),st=Math.round((n-ba)*100),txt="";
  if(ba===0)txt="ศูนย์บาท";
  else{
    var s=String(ba),out="";
    if(s.length>6){ out=conv(s.slice(0,s.length-6))+"ล้าน"; s=s.slice(s.length-6); }
    out+=conv(s); txt=out+"บาท";
  }
  if(st===0)txt+="ถ้วน"; else txt+=conv(String(st))+"สตางค์";
  return txt;
}

function openBillPreview(idx){
  var b=(_currentZoneBills||[])[idx];
  if(!b) return;
  document.getElementById("billprev-paper").innerHTML = buildBillHTML(b);
  document.getElementById("billprev-bg").classList.add("show");
}
function closeBillPreview(e){
  if(!e || e.target===document.getElementById("billprev-bg")){
    document.getElementById("billprev-bg").classList.remove("show");
  }
}
function printBillPreview(){
  var html=document.getElementById("billprev-paper").innerHTML;
  var w=window.open("","_print","width=320,height=600");
  w.document.write('<html><head><title>บิล</title><style>@page{size:80mm auto;margin:0}body{margin:0;font-family:Sarabun,sans-serif}</style></head><body>'+html+'</body></html>');
  w.document.close(); w.focus();
  setTimeout(function(){ w.print(); w.close(); }, 300);
}

function buildBillHTML(b){
  var f=(b.form&&typeof b.form==="object")?b.form:{};
  var pick=function(k){ return b[k]||f[k]||""; };
  var sender   = pick("senderName")||pick("sender");
  var senderPh = pick("senderPhone");
  var origin   = pick("originProv");
  var recv     = pick("receiverName");
  var recvPh   = pick("receiverPhone");
  var prov     = getBillProv(b), amphoe=getBillAmphoe(b), tambon=pick("destTambon");
  var addr     = pick("receiverAddr")||pick("destAddr")||"";
  var pay      = getBillPay(b);
  var net      = parseFloat(b.freightNet||0);
  var cod      = parseFloat(b.codTotal||0);
  var items    = Array.isArray(b.items)?b.items:(Array.isArray(f.items)?f.items:[]);
  var clerk    = pick("clerkName")||pick("staffName")||b.clerkCode||"";
  var row=function(l,v){ return v?('<div style="display:flex;gap:6px;margin:2px 0"><span style="color:#666;min-width:54px;font-size:11px">'+l+'</span><span style="flex:1;font-weight:700">'+v+'</span></div>'):''; };

  var itemRows = items.length
    ? items.map(function(it,i){
        var d=it.desc||it.name||("รายการ "+(i+1));
        var q=it.qty?(" x"+it.qty):"";
        var kg=it.kg?(" "+it.kg+"kg"):"";
        return '<tr><td style="padding:2px 0">'+(i+1)+'. '+d+kg+q+'</td></tr>';
      }).join("")
    : '<tr><td style="padding:2px 0;color:#888">'+(pick("note")||"—")+'</td></tr>';

  return ''
    +'<div style="width:302px;box-sizing:border-box;padding:16px 16px 12px;font-family:Sarabun,sans-serif;font-size:12px;font-weight:700;line-height:1.7;color:#000">'
    +'<div style="text-align:center;font-size:16px;font-weight:900">GOLOD TRANSPORT</div>'
    +'<div style="text-align:center;font-size:11px;color:#444;margin-bottom:6px">โกโลด ทรานสปอร์ต</div>'
    +'<div style="display:flex;justify-content:space-between;border-top:1.5px solid #000;border-bottom:1px dashed #555;padding:4px 0;margin-bottom:6px">'
      +'<span style="font-weight:900">'+(b.billNo||"")+'</span>'
      +'<span style="font-size:11px;color:#444">'+fmtBillDate(b)+'</span></div>'
    +'<div style="font-size:11px;color:#0F6E56;font-weight:800;margin-bottom:2px">ผู้ส่ง</div>'
    +row("ชื่อ",sender)+row("โทร",senderPh)+row("ต้นทาง",origin)
    +'<div style="font-size:11px;color:#0F6E56;font-weight:800;margin:6px 0 2px">ผู้รับ</div>'
    +row("ชื่อ",recv)+row("โทร",recvPh)
    +row("ที่อยู่",addr)
    +row("ปลายทาง",[tambon,amphoe,prov].filter(Boolean).join(" "))
    +'<div style="font-size:11px;color:#0F6E56;font-weight:800;margin:6px 0 2px">รายการสินค้า</div>'
    +'<table style="width:100%;font-size:12px;font-weight:700"><tbody>'+itemRows+'</tbody></table>'
    +'<div style="border-top:1.5px solid #000;margin:6px 0 4px"></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:baseline;font-weight:900;font-size:13px;gap:6px">'
      +'<span style="flex-shrink:0">ค่าขนส่ง ('+(PAY_LABEL[pay]||pay)+')</span>'
      +'<span style="flex:1;text-align:right;min-width:0"><span style="white-space:nowrap">'+fmt(net)+'.-</span>'
      +'<span style="font-size:10px;font-weight:700;margin-left:4px;word-break:break-word">('+bahtTextTH(net)+')</span></span></div>'
    +(cod>0?'<div style="display:flex;justify-content:space-between;font-weight:900;font-size:13px;color:#d8543f;margin-top:3px"><span>เก็บปลายทาง COD</span><span>'+fmt(cod)+'.-</span></div>':'')
    +'<div style="border-top:1px dashed #555;margin:8px 0 4px"></div>'
    +(clerk?'<div style="text-align:center;font-size:11px;color:#444">ผู้ออกบิล: '+clerk+'</div>':'')
    +'<div style="text-align:center;font-size:10px;color:#888;margin-top:4px">เช็กสถานะ: line @golod</div>'
    +'</div>';
}

// ===== RENDER SUMMARY =====
function renderSummary(bills, title){
  var s=calcSummary(bills);
  var payHTML=PAY_TYPES.map(function(p){
    var val=p.key==="cod"?s.byPay.cod:s.byPay[p.key]||0;
    return '<div class="stat-box"><div class="lbl">'+p.label+'</div>'
      +'<div class="val" style="color:'+p.color+'">'+fmt(val)+'</div>'
      +'<div class="sub">฿</div></div>';
  }).join("");

  // zone rows — ยอดรวมกดได้
  var zoneRows=Object.keys(ZONE_MAP).map(function(z){
    var zd=s.byZone[z]||{total:0,bills:0,byPay:{origin:0,dest:0,transfer:0,credit:0}};
    var zBills=s.zoneBills[z]||[];
    var zclr=ZONE_MAP[z].clr;
    var clickable=zBills.length>0;
    var totalCell=clickable
      ? '<span class="zone-total-link" style="color:'+zclr+'" onclick=\'openZoneModal("'+z+'",_lastZoneBills["'+z+'"])\'>'+fmt(zd.total)+'</span>'
      : fmt(zd.total);
    return '<tr>'
      +'<td><span class="badge '+ZONE_MAP[z].color+'" style="cursor:'+(clickable?"pointer":"default")+'" '
      +(clickable?'onclick=\'openZoneModal("'+z+'",_lastZoneBills["'+z+'"])\'':'')
      +'>'+z+'</span></td>'
      +'<td>'+fmt(zd.byPay.origin||0)+'</td>'
      +'<td>'+fmt(zd.byPay.dest||0)+'</td>'
      +'<td>'+fmt(zd.byPay.transfer||0)+'</td>'
      +'<td>'+fmt(zd.byPay.credit||0)+'</td>'
      +'<td>'+totalCell+'</td>'
      +'<td style="color:#888">'+zd.bills+'</td></tr>';
  }).join("");

  // เก็บ zone bills ไว้ให้ modal ใช้
  _lastZoneBills = s.zoneBills;

  var branchRows=Object.keys(BRANCH_MAP).map(function(k){
    return '<tr><td>'+BRANCH_MAP[k]+'</td>'
      +'<td style="font-weight:700;color:#0F6E56">'+fmt(s.byBranch[k]||0)+'</td></tr>';
  }).join("");

  return '<div class="card">'
    +'<div class="card-title">'+title+' — รวม '+s.bills+' บิล | ยอดรวม '+fmt(s.total)+' ฿</div>'
    +'<div class="stat-grid">'+payHTML+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 300px;gap:12px">'
    +'<div><div style="font-size:11px;font-weight:700;color:#555;margin-bottom:6px">แยกตาม Zone '
    +'<span style="font-size:10px;color:#888;font-weight:400">(กดยอดรวมเพื่อดูรายการบิล)</span></div>'
    +'<table><tr><th style="text-align:left">Zone</th><th>ต้นทาง</th><th>ปลายทาง</th><th>โอน</th><th>เครดิต</th><th>รวม</th><th>บิล</th></tr>'
    +zoneRows+'</table></div>'
    +'<div><div style="font-size:11px;font-weight:700;color:#555;margin-bottom:6px">แยกตามสาขา</div>'
    +'<table><tr><th style="text-align:left">สาขา</th><th>ยอดรวม</th></tr>'
    +branchRows+'</table></div>'
    +'</div></div>';
}

var _lastZoneBills = {};

function renderDailyTable(bills, days){
  var rows=days.map(function(d){
    var ds=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    var de=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    var dayBills=filterByDate(bills,ds,de);
    var s=calcSummary(dayBills);
    return '<tr><td>'+fmtDate(d)+'</td><td>'+dayBills.length+'</td>'
      +'<td>'+fmt(s.byPay.origin)+'</td>'
      +'<td>'+fmt(s.byPay.dest)+'</td>'
      +'<td>'+fmt(s.byPay.transfer)+'</td>'
      +'<td>'+fmt(s.byPay.credit)+'</td>'
      +'<td>'+fmt(s.byPay.cod)+'</td>'
      +'<td style="font-weight:700;color:#0F6E56">'+fmt(s.total)+'</td></tr>';
  }).join("");

  return '<div class="card"><div class="card-title">สรุปรายวัน</div>'
    +'<table><tr><th style="text-align:left">วันที่</th><th>บิล</th>'
    +'<th>ต้นทาง</th><th>ปลายทาง</th><th>โอน</th><th>เครดิต</th><th>COD</th><th>รวม</th></tr>'
    +rows+'</table></div>';
}

function getDays(from, to){
  var days=[], cur=new Date(from);
  while(cur<=to){ days.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return days.reverse();
}

var allBills=[];

function render(){
  var mode=document.getElementById("mode-sel").value;
  var wrap=document.getElementById("report-wrap");

  if(allBills.length===0){
    wrap.innerHTML='<div class="loading">ไม่มีข้อมูล — กรุณารอ sync หรือลอง reload</div>';
    return;
  }

  var today=new Date();
  var todayStart=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  var todayEnd=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  var html="";

  if(mode==="today"){
    var todayBills=filterByDate(allBills,todayStart,todayEnd);
    html=renderSummary(todayBills,"📅 ยอดขายวันนี้ ("+fmtDate(today)+")");

  } else if(mode==="month"){
    var yr=parseInt(document.getElementById("yr-sel").value)||today.getFullYear()+543;
    var mn=parseInt(document.getElementById("mn-sel").value)||(today.getMonth()+1);
    var thYr=yr-543;
    var mStart=new Date(thYr,mn-1,1);
    var mEnd=new Date(thYr,mn,0);
    var mBills=filterByDate(allBills,mStart,mEnd);
    var MONTH_TH=["","มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    html=renderSummary(mBills,"📆 ยอดขาย "+MONTH_TH[mn]+" "+yr);
    html+=renderDailyTable(mBills, getDays(mStart,mEnd));

  } else if(mode==="range"){
    var _fv=document.getElementById("from-d").value;
    var _tv=document.getElementById("to-d").value;
    // parse เป็น local date ไม่ผ่าน UTC (ป้องกัน timezone shift)
    var _fp=_fv.split("-"); var _tp=_tv.split("-");
    var f=_fp.length===3?new Date(parseInt(_fp[0]),parseInt(_fp[1])-1,parseInt(_fp[2])):new Date(_fv);
    var t=_tp.length===3?new Date(parseInt(_tp[0]),parseInt(_tp[1])-1,parseInt(_tp[2])):new Date(_tv);
    if(isNaN(f)||isNaN(t)){
      wrap.innerHTML='<div class="loading">กรุณาเลือกวันที่</div>'; return;
    }
    var rBills=filterByDate(allBills,f,t);
    html=renderSummary(rBills,"📋 ยอดขาย "+fmtDate(f)+" — "+fmtDate(t));
    html+=renderDailyTable(rBills,getDays(f,t));
  }

  wrap.innerHTML=html;
}

function buildUI(){
  var today=new Date();
  var yr=today.getFullYear()+543;
  var mn=today.getMonth()+1;
  var MONTH_TH=["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

  var yrOpts=[yr,yr-1,yr-2].map(function(y){return '<option value="'+y+'">'+y+'</option>';}).join("");
  var mnOpts=Array.from({length:12},function(_,i){
    return '<option value="'+(i+1)+'"'+(i+1===mn?' selected':'')+'>'+MONTH_TH[i+1]+'</option>';
  }).join("");

  var bar='<div class="card filters">'
    +'<select id="mode-sel" onchange="toggleMode()">'
    +'<option value="today">วันนี้</option>'
    +'<option value="month">รายเดือน</option>'
    +'<option value="range">ช่วงวันที่</option>'
    +'</select>'
    +'<span id="month-ctrl"><select id="yr-sel">'+yrOpts+'</select>'
    +'<select id="mn-sel">'+mnOpts+'</select></span>'
    +'<span id="range-ctrl" style="display:none">'
    +'<input type="date" id="from-d"> — <input type="date" id="to-d"></span>'
    +'<button onclick="render()">🔍 แสดง</button>'
    +'<button class="sec" onclick="loadData()">🔄 โหลดใหม่</button>'
    +'<span id="bill-count" style="font-size:11px;color:#888"></span>'
    +'</div>';

  document.querySelector(".container").innerHTML=bar+'<div id="report-wrap"><div class="loading">⏳ กำลังโหลด...</div></div>';
}

function toggleMode(){
  var m=document.getElementById("mode-sel").value;
  document.getElementById("month-ctrl").style.display=m==="month"?"":"none";
  document.getElementById("range-ctrl").style.display=m==="range"?"":"none";
  // ตั้ง default วันที่เมื่อ switch มา range
  if(m==="range"){
    var fd=document.getElementById("from-d");
    var td=document.getElementById("to-d");
    if(!fd.value){
      var now=new Date();
      var toISO=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
      var yest=new Date(now); yest.setDate(yest.getDate()-1);
      var fromISO=yest.getFullYear()+"-"+String(yest.getMonth()+1).padStart(2,"0")+"-"+String(yest.getDate()).padStart(2,"0");
      fd.value=fromISO;
      td.value=toISO;
    }
  }
}

function loadData(){
  document.getElementById("report-wrap").innerHTML='<div class="loading">⏳ กำลังดึงข้อมูลจาก Firestore...</div>';
  function doLoad(){
    GolodDB.getBillsNew(3000).then(function(bills){
      allBills=bills;
      var el=document.getElementById("bill-count");
      if(el) el.textContent="โหลดแล้ว "+bills.length+" บิล";
      render();
    }).catch(function(e){
      document.getElementById("report-wrap").innerHTML='<div class="loading">❌ โหลดไม่สำเร็จ: '+e.message+'</div>';
    });
  }
  if(typeof GolodDB==="undefined"){
    document.getElementById("report-wrap").innerHTML='<div class="loading">❌ Firestore ไม่พร้อม</div>';
    return;
  }
  if(typeof GolodDB.ready==="function"){
    GolodDB.ready(doLoad);
  } else {
    setTimeout(doLoad, 1500);
  }
}

// INIT
buildUI();
try{ if(typeof GolodDB!=="undefined") GolodDB.init(); }catch(e){}
function waitAndLoad(){
  if(typeof GolodDB!=="undefined"){
    try{ GolodDB.init(); }catch(e){}
    if(typeof GolodDB.ready==="function"){
      GolodDB.ready(function(){ loadData(); });
    } else {
      setTimeout(loadData, 1000);
    }
  } else {
    setTimeout(waitAndLoad, 300);
  }
}
waitAndLoad();
</script>
