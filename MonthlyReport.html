<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>โกโลด — สรุปรายเดือน</title>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="golod-firebase.js?v=1779235999"></script>
<script>try{GolodDB.init();}catch(e){}</script>
<script src="session.js"></script>
<script>var _S=GolodSession.require("transport",null);if(!_S)throw new Error("no session");</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f2;min-height:100vh;font-size:13px}
.topbar{background:#0F6E56;padding:0 14px;display:flex;align-items:center;gap:10px;height:44px;position:sticky;top:0;z-index:200}
.topbar h1{color:#fff;font-size:13px;font-weight:700;flex:1}
.topbar a{font-size:11px;color:#9FE1CB;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;text-decoration:none}
.container{padding:12px}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.filter-bar label{font-size:11px;color:#888}
.filter-bar input,.filter-bar select{padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:inherit}
.btn{padding:7px 14px;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit}
.btn-green{background:#0F6E56;color:#fff}
.btn-gray{background:#eee;color:#555}
.loading{text-align:center;padding:30px;color:#888}
/* table */
.tbl-wrap{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#0F6E56;color:#fff;padding:5px 6px;text-align:right;white-space:nowrap;font-weight:600;font-size:10px;position:sticky;top:44px}
th:first-child,th:nth-child(2),th:nth-child(3),th:nth-child(4){text-align:center}
td{padding:5px 6px;border-bottom:1px solid #f0f0f0;text-align:right;white-space:nowrap;font-size:11px}
td:first-child{text-align:center;color:#888}
td:nth-child(2){text-align:center}
td:nth-child(3){text-align:center;font-size:10px;color:#888}
td:nth-child(4){text-align:left;font-size:11px}
tr:nth-child(even){background:#fafafa}
tr.sum-row{background:#f0faf5;font-weight:800}
tr.sum-row td{color:#0F6E56;border-top:2px solid #0F6E56}
/* driver section */
.driver-section{margin-bottom:16px}
.driver-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.driver-name{font-weight:700;font-size:13px;color:#0F6E56}
.net-bar{background:linear-gradient(135deg,#0F6E56,#085041);color:#fff;border-radius:8px;padding:10px 14px;margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.nb-item{text-align:center}
.nb-item .nl{font-size:9px;opacity:.7}
.nb-item .nv{font-size:13px;font-weight:800}
.nb-total{background:rgba(255,255,255,.2);border-radius:6px;padding:8px 14px;margin-left:auto;text-align:center}
.nb-total .nl{font-size:10px;opacity:.8}
.nb-total .nv{font-size:18px;font-weight:800}
/* print */
@media print{.topbar,.filter-bar,.no-print{display:none!important}body{background:#fff}.card{box-shadow:none}th{position:static}}
</style>
</head>
<body>
<div class="topbar">
  <h1>โกโลด ทรานสปอร์ต — สรุปรายเดือน</h1>
  <div id="golod-chip"></div>
  <button class="btn btn-gray no-print" onclick="window.print()" style="font-size:11px;padding:4px 10px">🖨 พิมพ์</button>
  <a href="GolodApp.html">← หน้าหลัก</a>
</div>
<div class="container">
  <div class="card no-print">
    <div class="filter-bar">
      <label>เดือน/ปี:</label>
      <input type="month" id="sel-month" value="">
      <label>คนขับ:</label>
      <select id="sel-driver"><option value="">-- ทุกคน --</option></select>
      <button class="btn btn-green" onclick="loadReport()">🔍 โหลด</button>
    </div>
    <div style="font-size:10px;color:#888">
      🟡 เหลือง = กรอก/แก้ได้ (admin) &nbsp;|&nbsp;
      ✅ = เคลียร์แล้ว &nbsp;|&nbsp;
      🟡 = ยังไม่เคลียร์ &nbsp;|&nbsp;
      ❌ ขาด ≥1,200฿ → ปรับ 3%, ≥2,500฿ → ปรับ 5%
    </div>
  </div>
  <div id="report-area"><div class="card"><div class="loading">⏳ เลือกเดือนแล้วกด โหลด</div></div></div>
</div>
<script>
GolodSession.renderTopbar("golod-chip","สรุปรายเดือน","#EF9F27");
var CU = GolodSession.get();
var isAdmin = CU && (CU.role==="admin");

// default month = current
(function(){
  var now=new Date();
  document.getElementById("sel-month").value=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
})();

var _drivers=[], _allTrips=[];

GolodDB.ready(function(){
  // โหลด drivers
  if(GolodDB.getUsers){
    GolodDB.getUsers().then(function(users){
      _drivers=(users||[]).filter(function(u){return u.role==="driver";});
      var sel=document.getElementById("sel-driver");
      _drivers.forEach(function(d){
        var o=document.createElement("option");
        o.value=d.username; o.textContent=d.name;
        sel.appendChild(o);
      });
    }).catch(function(){});
  }
});

function loadReport(){
  var month=document.getElementById("sel-month").value;
  var driver=document.getElementById("sel-driver").value;
  var area=document.getElementById("report-area");
  area.innerHTML='<div class="card"><div class="loading">⏳ กำลังโหลด...</div></div>';

  if(!GolodDB.getTrips){ area.innerHTML='<div class="card"><div class="loading">❌ กรุณา deploy golod-firebase.js ใหม่ก่อน</div></div>'; return; }

  GolodDB.getTrips({limitN:500}).then(function(trips){
    _allTrips=trips||[];
    renderReport(month,driver);
  }).catch(function(e){
    area.innerHTML='<div class="card"><div class="loading">❌ '+e.message+'</div></div>';
  });
}

function renderReport(selMonth, selDriver){
  var fmt=function(n){return n?(Math.round(n)||0).toLocaleString("th-TH"):"-";};
  var ub=CU?CU.branch:"";

  // filter
  var trips=_allTrips.filter(function(t){
    if(selDriver&&t.driverUsername!==selDriver) return false;
    if(selMonth){var dp=(t.departDate||t.createdAt||"").slice(0,7);if(dp!==selMonth)return false;}
    // branch filter (non-admin)
    if(!isAdmin&&ub){
      var branchMap={"กรุงเทพ":["bkk","ptm"],"นครราชสีมา":["krt"],"ศรีสะเกษ":["ssk"]};
      var allowed=[ub];
      Object.values(branchMap).forEach(function(arr){if(arr.includes(ub))allowed=allowed.concat(arr);});
      if(!allowed.includes(t.branch||"")) return false;
    }
    return true;
  });

  if(trips.length===0){
    document.getElementById("report-area").innerHTML='<div class="card"><div class="loading">ไม่พบข้อมูลในช่วงนี้</div></div>';
    return;
  }

  // group by driver
  var byDriver={};
  trips.forEach(function(t){
    var k=t.driverUsername||"unknown";
    if(!byDriver[k])byDriver[k]={name:t.driverName||k,trips:[]};
    byDriver[k].trips.push(t);
  });

  var html="";
  Object.values(byDriver).forEach(function(dData){
    var dTrips=dData.trips.slice().sort(function(a,b){
      return (a.departDate||a.createdAt||"").localeCompare(b.departDate||b.createdAt||"");
    });

    // totals
    var tot={fare:0,hotel:0,labor:0,fareTotal:0,fuel:0,
             dest:0,cod:0,pkCash:0,pkDest:0,mustPay:0,
             clrCash:0,clrTrans:0,diff:0,fine:0,
             bonus:0,phone:0,insurD:0,drawCash:0};

    var rows=dTrips.map(function(t,i){
      var s=t.summary||{},cd=t.clearData||{};
      var fare=parseFloat(t.baseFare||0)+parseFloat(t.extraFare||0);
      var hotel=parseFloat(t.hotelFare||0);
      var labor=parseFloat(t.ratePerBill||0)*(s.billCount||0);
      var fareT=fare+hotel+labor;
      var fuel=parseFloat(cd.fuelReal||t.fuelEst||0);
      var dest=parseFloat(s.destTotal||0);
      var cod=parseFloat(s.codTotal||0);
      var pkC=parseFloat(cd.pickupCash||0);
      var pkD=parseFloat(cd.pickupDest||0);
      var mustP=parseFloat(cd.mustPay||(dest+cod+pkD));
      var clrC=parseFloat(cd.clrCash||0);
      var clrT=parseFloat(cd.clrTrans||0);
      var diff=parseFloat(cd.diff||0);
      var fine=parseFloat(cd.fine||0);
      tot.fare+=fare;tot.hotel+=hotel;tot.labor+=labor;tot.fareTotal+=fareT;
      tot.fuel+=fuel;tot.dest+=dest;tot.cod+=cod;tot.pkCash+=pkC;tot.pkDest+=pkD;
      tot.mustPay+=mustP;tot.clrCash+=clrC;tot.clrTrans+=clrT;tot.diff+=diff;tot.fine+=fine;
      tot.bonus+=parseFloat(t.bonusFare||0);tot.phone+=parseFloat(t.phoneFare||0);
      tot.insurD+=parseFloat(t.insurDeduct||0);tot.drawCash+=parseFloat(t.drawCash||0);

      var cleared=t.status==="cleared";
      var stIcon=cleared?"✅":"🟡";
      var diffClr=diff<0?"color:#c0392b":"color:#0F6E56";
      var distDisp=cd.distReal>0?cd.distReal.toLocaleString("th-TH")+" กม.":(t.fuelDist||"—");

      var fareAdminCells=isAdmin
        ?'<td>'+fmt(fare)+'</td><td>'+fmt(hotel)+'</td><td>'+fmt(labor)+'</td><td style="font-weight:700;color:#0F6E56">'+fmt(fareT)+'</td>'
        :'';

      return '<tr>'
        +'<td>'+stIcon+'</td>'
        +'<td>'+(i+1)+'</td>'
        +'<td>'+((t.departDate||"").slice(5)||"—")+'</td>'
        +'<td style="text-align:left">'+((t.route||"—").slice(0,12))+'</td>'
        +'<td style="font-size:10px;color:#888">'+distDisp+'</td>'
        +'<td style="color:#b7950b">'+fmt(fuel)+'</td>'
        +fareAdminCells
        +'<td>'+fmt(dest)+'</td>'
        +'<td style="color:#c0392b">'+fmt(cod)+'</td>'
        +'<td>'+fmt(pkC)+'</td>'
        +'<td>'+fmt(pkD)+'</td>'
        +'<td style="font-weight:700;color:#c0392b">'+fmt(mustP)+'</td>'
        +'<td>'+fmt(clrC)+'</td>'
        +'<td>'+fmt(clrT)+'</td>'
        +'<td style="font-weight:700;'+diffClr+'">'+fmt(diff)+'</td>'
        +'<td style="color:#c0392b">'+fmt(fine)+'</td>'
        +'</tr>';
    }).join("");

    var fareAdminHeads=isAdmin
      ?'<th>ค่าเที่ยว</th><th>โรงแรม</th><th>ค่าแรง</th><th>รวมเที่ยว</th>'
      :'';
    var fareAdminSum=isAdmin
      ?'<td>'+fmt(tot.fare)+'</td><td>'+fmt(tot.hotel)+'</td><td>'+fmt(tot.labor)+'</td><td style="color:#0F6E56">'+fmt(tot.fareTotal)+'</td>'
      :'';
    var diffClr=tot.diff<0?"color:#c0392b":"color:#0F6E56";

    var netBar="";
    if(isAdmin){
      var incT=tot.fareTotal+tot.bonus+tot.phone;
      var net=incT-tot.diff-tot.insurD-tot.drawCash;
      netBar='<div class="net-bar">'
        +'<div class="nb-item"><div class="nl">ค่าเที่ยวรวม</div><div class="nv">'+fmt(tot.fareTotal)+'</div></div>'
        +'<div style="opacity:.5">+</div>'
        +'<div class="nb-item"><div class="nl">เบี้ย+ค่าโทร</div><div class="nv">'+fmt(tot.bonus+tot.phone)+'</div></div>'
        +'<div style="opacity:.5">−</div>'
        +'<div class="nb-item"><div class="nl">เบิก/เกินรวม</div><div class="nv">'+fmt(tot.diff)+'</div></div>'
        +'<div style="opacity:.5">−</div>'
        +'<div class="nb-item"><div class="nl">ประกัน+เบิกร้าน</div><div class="nv">'+fmt(tot.insurD+tot.drawCash)+'</div></div>'
        +'<div class="nb-total"><div class="nl">รายได้สุทธิ</div><div class="nv">'+fmt(net)+' ฿</div></div>'
        +'</div>';
    }

    html+='<div class="card driver-section">'
      +'<div class="driver-head">'
      +'<div class="driver-name">🚛 '+dData.name+'</div>'
      +'<div style="font-size:11px;color:#888">'+dTrips.length+' เที่ยว | '+selMonth+'</div>'
      +'</div>'
      +'<div class="tbl-wrap"><table>'
      +'<tr><th>✓</th><th>#</th><th>วันที่</th><th style="text-align:left">เส้นทาง</th><th>ระยะทาง</th><th>น้ำมัน</th>'
      +fareAdminHeads
      +'<th>ปลายทาง</th><th>COD</th><th>รับสด</th><th>รับปลาย</th>'
      +'<th>ต้องเคลียร์</th><th>เคลียร์สด</th><th>เคลียร์โอน</th><th>ขาด/เกิน</th><th>ปรับ</th>'
      +'</tr>'
      +rows
      +'<tr class="sum-row">'
      +'<td colspan="5" style="text-align:right">รวม</td>'
      +'<td style="color:#b7950b">'+fmt(tot.fuel)+'</td>'
      +fareAdminSum
      +'<td>'+fmt(tot.dest)+'</td>'
      +'<td style="color:#c0392b">'+fmt(tot.cod)+'</td>'
      +'<td>'+fmt(tot.pkCash)+'</td>'
      +'<td>'+fmt(tot.pkDest)+'</td>'
      +'<td style="color:#c0392b">'+fmt(tot.mustPay)+'</td>'
      +'<td>'+fmt(tot.clrCash)+'</td>'
      +'<td>'+fmt(tot.clrTrans)+'</td>'
      +'<td style="'+diffClr+'">'+fmt(tot.diff)+'</td>'
      +'<td style="color:#c0392b">'+fmt(tot.fine)+'</td>'
      +'</tr>'
      +'</table></div>'
      +netBar
      +'</div>';
  });

  document.getElementById("report-area").innerHTML=html;
}
</script>
</body></html>
