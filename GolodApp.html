<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>โกโลด ทรานสปอร์ต</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f2;min-height:100vh}
.hidden{display:none!important}
/* ===LOGIN=== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F6E56,#085041,#052E25);padding:16px}
.login-box{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo h1{font-size:20px;font-weight:700;color:#0F6E56}
.login-logo p{font-size:12px;color:#888;margin-top:4px}
.sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.sys-btn{padding:9px 6px;border:1.5px solid #eee;border-radius:9px;cursor:pointer;text-align:center;background:#fafafa;transition:all .15s}
.sys-btn.on{border-color:#1D9E75;background:#E1F5EE}
.sys-btn .ic{font-size:18px;margin-bottom:3px}
.sys-btn .lb{font-size:11px;font-weight:600;color:#333}
.inp-wrap{margin-bottom:12px}
.inp-wrap label{font-size:11px;color:#666;display:block;margin-bottom:4px;font-weight:500}
.inp-wrap input{width:100%;padding:9px 11px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;outline:none}
.inp-wrap input:focus{border-color:#1D9E75}
.btn-login{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.login-hint{font-size:10px;color:#aaa;line-height:1.7;margin-bottom:12px}
.login-err{background:#FBEAF0;color:#4B1528;border:0.5px solid #E9B8C0;border-radius:7px;padding:8px 11px;font-size:12px;margin-bottom:10px}
/* ===APP=== */
.app-wrap{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#0F6E56;padding:0 14px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar h1{color:#fff;font-size:14px;font-weight:700;flex:1}
.sys-chip{font-size:10px;color:#9FE1CB;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px}
.user-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;cursor:pointer}
.user-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.user-nm{font-size:11px;color:#fff;font-weight:500}
.btn-out{padding:4px 10px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:20px;font-size:11px;cursor:pointer}
.body-wrap{display:flex;flex:1;overflow:hidden}
/* ===SIDEBAR=== */
.sidebar{width:200px;background:#fff;border-right:0.5px solid #eee;padding:8px 0;flex-shrink:0;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:600;color:#aaa;letter-spacing:1px;padding:8px 14px 3px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:#555;border-left:3px solid transparent;user-select:none;transition:all .1s}
.sb-item:hover{background:#f5f5f2;color:#0F6E56}
.sb-item.on{background:#E1F5EE;color:#0F6E56;font-weight:600;border-left-color:#1D9E75}
.sb-item.locked{color:#ccc;cursor:default}
.sb-item .ic{font-size:14px;width:18px;text-align:center}
.sb-lock{font-size:10px;margin-left:auto;color:#ddd}
/* ===CONTENT=== */
.content{flex:1;overflow-y:auto;padding:14px;background:#f5f5f2}
/* ===CARDS=== */
.card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:11px;padding:13px 15px;margin-bottom:10px}
.ct{font-size:13px;font-weight:600;color:#0F6E56;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{border-radius:9px;padding:11px 13px}
.sg{background:#E1F5EE}.sg .sv{color:#085041}
.sa{background:#FFF8E7}.sa .sv{color:#633806}
.sb2{background:#E6F1FB}.sb2 .sv{color:#0C447C}
.sr{background:#FBEAF0}.sr .sv{color:#A32D2D}
.sx{background:#f5f5f2}.sx .sv{color:#333}
.sl{font-size:10px;color:#888;margin-bottom:2px}
.sv{font-size:18px;font-weight:700}
.ss{font-size:10px;color:#aaa;margin-top:2px}
/* ===TABLE=== */
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 9px;text-align:left;font-weight:500;color:#777;border-bottom:0.5px solid rgba(0,0,0,.08);background:#f9f9f7;font-size:11px;white-space:nowrap}
td{padding:7px 9px;border-bottom:0.5px solid rgba(0,0,0,.05);vertical-align:middle}
tr:nth-child(even) td{background:#fafafa}
.tfoot td{background:#E1F5EE!important;font-weight:700;color:#085041}
/* ===PILLS=== */
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.pg{background:#E1F5EE;color:#085041}.pr{background:#FBEAF0;color:#A32D2D}
.pa{background:#FFF8E7;color:#854F0B}.pb{background:#E6F1FB;color:#0C447C}
.pp{background:#EDE9FE;color:#5B21B6}.px{background:#f0f0f0;color:#555}
/* ===FORMS=== */
input[type=text],input[type=password],input[type=number],input[type=date],select,textarea{width:100%;padding:7px 9px;border:0.5px solid #ccc;border-radius:7px;font-size:12px;outline:none;background:#fff;color:#222;font-family:Arial,sans-serif}
input:focus,select:focus,textarea:focus{border-color:#1D9E75}
.lbl{font-size:11px;color:#777;margin-bottom:3px;display:block}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:500;border:none;font-family:Arial,sans-serif}
.btg{background:#1D9E75;color:#fff}.bto{background:#fff;border:0.5px solid #ccc;color:#555}
.bts{padding:3px 9px;font-size:11px;border-radius:6px;cursor:pointer;border:0.5px solid #ccc;background:#fff;font-family:Arial,sans-serif}
.frow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
/* ===MODAL=== */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:14px;pointer-events:none}
.modal-bg.open{display:flex;pointer-events:all}
.modal{background:#fff;border-radius:13px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:18px}
.mtitle{font-size:14px;font-weight:700;color:#0F6E56;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
/* ===MISC=== */
.pbar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:3px}
.pfill{height:5px;border-radius:3px}
.denied{text-align:center;padding:48px 16px;color:#aaa}
.denied .big{font-size:40px;margin-bottom:10px}
.alr{background:#FBEAF0;border:0.5px solid #E9B8C0;color:#4B1528;padding:8px 11px;border-radius:8px;font-size:12px;margin-bottom:8px}
.alg{background:#E1F5EE;border:0.5px solid #9FE1CB;color:#085041;padding:8px 11px;border-radius:8px;font-size:12px;margin-bottom:8px}
/* tracking */
.tl-wrap{position:relative;padding-left:24px}
.tl-line{position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:#e0e0e0}
.tl-item{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-20px;top:2px;width:14px;height:14px;border-radius:50%;background:#f5f5f2;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:8px}
.tl-box{border-radius:9px;padding:9px 11px;background:#fafafa;border:0.5px solid #eee}
/* toggle */
.toggle{position:relative;width:34px;height:19px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#ddd;border-radius:19px;cursor:pointer;transition:.3s}
.slider:before{content:"";position:absolute;width:13px;height:13px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:#1D9E75}
input:checked+.slider:before{transform:translateX(15px)}
@media(max-width:640px){.sidebar{display:none}.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
</style>

function loadRealBills(rawBillsArg){
  try{
    var arr;
    if(rawBillsArg && Array.isArray(rawBillsArg)){
      // ใช้ array ที่ส่งมาโดยตรง (จาก Firestore 3000)
      arr=rawBillsArg;
    } else {
      // ลอง localStorage ก่อน
      var raw=localStorage.getItem("golod_bills");
      // ถ้าว่าง ให้ดึงจาก Firestore
      if((!raw||JSON.parse(raw).length===0) && typeof GolodDB!=="undefined"){
        GolodDB.getBillsNew(3000).then(function(bills){
          if(bills&&bills.length>0){
            try{localStorage.setItem("golod_bills",JSON.stringify(bills.slice(0,500)));}catch(e){}
            window._billsData=loadRealBills(bills);
            filterBillsPage();
          }
        }).catch(function(){});
      }
      if(!raw) return [];
      arr=JSON.parse(raw);
    }
    // map freightPay เก่า → ใหม่
    var PAY_MAP={"dest":"dest_cash","dest_cash":"dest_cash","dest_transfer":"dest_transfer","dest_driver":"dest_driver","origin":"origin","transfer":"transfer","credit":"credit","origin_enroute":"origin_enroute"};
    // zone ตาม destProv+destAmphoe
    var KANCHAN_FAR=["สังขละบุรี","ทองผาภูมิ","ศรีสวัสดิ์","ไทรโยค","หนองปรือ"];
    function getZone(prov,amphoe){
      var bkk=["กรุงเทพมหานคร","นนทบุรี","ปทุมธานี","สมุทรปราการ","สมุทรสาคร","นครปฐม","สมุทรสงคราม"];
      var east=["ชลบุรี","ระยอง","จันทบุรี","ตราด","ฉะเชิงเทรา","สระแก้ว","ปราจีนบุรี","นครนายก"];
      var north=["เชียงใหม่","เชียงราย","ลำปาง","ลำพูน","แม่ฮ่องสอน","น่าน","พะเยา","แพร่","ตาก","อุตรดิตถ์","พิษณุโลก","เพชรบูรณ์","สุโขทัย","กำแพงเพชร","พิจิตร","นครสวรรค์","อุทัยธานี","สิงห์บุรี","อ่างทอง","พระนครศรีอยุธยา","ลพบุรี","สระบุรี","ชัยนาท"];
      var west=["กาญจนบุรี","ราชบุรี","เพชรบุรี","ประจวบคีรีขันธ์","สุพรรณบุรี"];
      var south=["สุราษฎร์ธานี","นครศรีธรรมราช","กระบี่","พังงา","ภูเก็ต","ตรัง","พัทลุง","สตูล","ชุมพร","ระนอง","สงขลา","ปัตตานี","ยะลา","นราธิวาส"];
      var lesan=["ศรีสะเกษ","อุบลราชธานี","ยโสธร","อำนาจเจริญ","สุรินทร์","บุรีรัมย์"];
      var korat=["นครราชสีมา","ชัยภูมิ"];
      var esan=["ขอนแก่น","อุดรธานี","หนองคาย","นครพนม","สกลนคร","กาฬสินธุ์","มหาสารคาม","ร้อยเอ็ด","เลย","หนองบัวลำภู","บึงกาฬ","มุกดาหาร"];
      if(bkk.indexOf(prov)>=0) return "BKK";
      if(east.indexOf(prov)>=0) return "East";
      if(north.indexOf(prov)>=0) return "North";
      if(west.indexOf(prov)>=0) return "West";
      if(south.indexOf(prov)>=0) return "South";
      if(lesan.indexOf(prov)>=0) return "LEsan";
      if(korat.indexOf(prov)>=0) return "Korat";
      if(esan.indexOf(prov)>=0) return "Esan";
      return "Central";
    }
    return arr.filter(function(b){return b.billNo&&b.billNo.length>3;}).map(function(b){
      var clerkCode=b.clerkCode||(b.billNo?b.billNo.charAt(0):"");
      var clerkName=b.clerkName||(CLERK_INFO[clerkCode]||{}).name||clerkCode;
      // items: array of objects → count qty
      var itemCount=1;
      if(Array.isArray(b.items)){
        itemCount=b.items.reduce(function(s,it){return s+(parseInt(it.qty)||1);},0);
      } else if(typeof b.items==="number"){itemCount=b.items;}
      else if(b.totalQty){itemCount=b.totalQty;}
      // weight
      var totalKg=0;
      if(Array.isArray(b.items)){
        totalKg=b.items.reduce(function(s,it){return s+(parseFloat(it.kg)||0);},0);
      } else {totalKg=b.totalKg||b.weight||0;}
      // date: รองรับทั้ง "2026-05-12" และ "12/5/2569"
      var dateISO=b.date||b.billDate||"";
      var dateDisplay=dateISO;
      if(dateISO.includes("-")){
        var p=dateISO.split("-");
        if(p.length===3) dateDisplay=parseInt(p[2])+"/"+parseInt(p[1])+"/"+(parseInt(p[0])+543);
      }
      // freightPay
      var payRaw=b.freightPay||"origin";
      var payKey=PAY_MAP[payRaw]||payRaw;
      var prov=b.destProv||b.form&&b.form.destProv||"";
      var amphoe=b.destAmphoe||b.form&&b.form.receiverAmphoe||"";
      // goodsDesc จากรายการแรก
      var goodsDesc="—";
      if(Array.isArray(b.items)&&b.items[0]){
        var gi=b.items[0];
        goodsDesc=(gi.desc||b.note||"—").slice(0,20)+(gi.desc&&gi.desc.length>20?"…":"");
      } else if(b.note){ goodsDesc=b.note.slice(0,20); }
      return {
        billNo:b.billNo,
        date:dateISO,
        dateDisplay:dateDisplay,
        clerkCode:clerkCode,
        clerkName:clerkName,
        branch:(CLERK_INFO[clerkCode]||{}).branch||"กรุงเทพ",
        region:getRegion(prov),
        destProv:prov,
        destAmphoe:amphoe,
        zone:getZone(prov,amphoe),
        senderName:b.senderName||"",
        receiverName:b.receiverName||b.form&&b.form.receiverName||"",
        items:itemCount,
        goodsDesc:goodsDesc,
        freightNet:b.freightNet||b.summary&&b.summary.freightNet||0,
        codTotal:b.codTotal||b.summary&&b.summary.codTotal||0,
        freightPay:payKey,
        freightPayLabel:MPAYLAB2[payKey]||payKey,
        status:b.status||"issued",
        driverName:b.driverName||"",
        planDeliverFrom:b.planDeliverFrom||"",
        planDeliverTo:b.planDeliverTo||"",
        bizType:b.bizType||"",
        note:b.note||"",
        weight:totalKg,
        slipUrl:b.slipUrl||"",
        slip1:b.slip1||"",
      };
    }).sort(function(a,b){
      var da=a.date||"",db=b.date||"";
      return db.localeCompare(da);
    });
  }catch(e){console.error("loadRealBills error:",e);return [];}
}

function doLogin(){
  var u=document.getElementById("u-inp").value.trim();
  var p=document.getElementById("p-inp").value;
  var err=document.getElementById("login-err");
  var found=null;
  // อ่าน users จาก localStorage ก่อน
  var lsUsers=[];
  try{var raw=localStorage.getItem("golod_users_v1");if(raw)lsUsers=JSON.parse(raw);}catch(e){}
  // ถ้า localStorage ว่าง หรือ user ไม่เจอ → ลอง sync จาก Firestore ก่อน
  var usernamesInLS=lsUsers.map(function(x){return x.username;});
  var merged=lsUsers.concat(USERS.filter(function(x){return usernamesInLS.indexOf(x.username)<0;}));
  for(var i=0;i<merged.length;i++){
    var usr=merged[i];
    if(usr.username===u&&usr.password===p&&usr.active){found=usr;break;}
  }
  if(!found){err.textContent="Username หรือ Password ไม่ถูกต้องครับ";err.classList.remove("hidden");return;}
  if(!found.systems.includes(SEL_SYS)&&found.role!=="admin"){err.textContent="ไม่มีสิทธิ์เข้าระบบนี้ครับ";err.classList.remove("hidden");return;}
  err.classList.add("hidden");
  // set default perms ถ้าไม่มี
  if(!found.perms){
    if(found.role==="admin"||found.role==="branch"){
      found.perms={billing:true,transport:true,finance:true,reports:true,customers:true,drivers:true,users:true};
    } else {
      found.perms={billing:true,transport:true,finance:false,reports:false,customers:false,drivers:false,users:false};
    }
  }
  CU=found;CS=SEL_SYS;
  GolodSession.save(CU, CS); // บันทึก session ทันทีหลัง login
  // ถ้ามี redirect ที่ค้างไว้ (มาจากหน้าอื่น) ให้ redirect กลับไปเลย
  var pendingRedirect = localStorage.getItem("golod_redirect");
  if(pendingRedirect){
    localStorage.removeItem("golod_redirect");
    window.location.href = pendingRedirect;
    return;
  }
  document.getElementById("login-wrap").style.display="none";
  document.getElementById("app-wrap").style.display="flex";
  var av=document.getElementById("u-av");
  av.textContent=CU.avatar;av.style.background=SYS_COLOR[CS]||"#1D9E75";
  document.getElementById("u-nm").textContent=CU.name.split(" ")[0];
  document.getElementById("sys-chip").textContent=SYSTEMS[CS]||"";
  // driver → บันทึก driver session แล้วไป DriverApp โดยตรง (ไม่ต้อง login อีก)
  if(CU.role==="driver"){
    var driverCodeMap={driver1:"A",driver2:"B",driver3:"N",driver4:"H",driver5:"P"};
    var dCode=driverCodeMap[CU.username]||CU.avatar||"A";
    var dSess=Object.assign({},CU,{driverCode:dCode,loginAt:Date.now()});
    localStorage.setItem("golod_driver_session",JSON.stringify(dSess));
    window.location.href="DriverApp.html";
    return;
  }
  buildSidebar();goSection("dashboard");
}

function sortBillsByNewest(bills){
  return bills.slice().sort(function(a,b){
    var ta=billTimestamp(a), tb=billTimestamp(b);
    return tb-ta;
  });
}
function billTimestamp(b){
  if(b.createdAt){ var t=new Date(b.createdAt).getTime(); if(!isNaN(t))return t; }
  if(b.date){
    var m=b.date.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m){ var y=parseInt(m[3]); if(y>2400)y-=543; return new Date(y,parseInt(m[2])-1,parseInt(m[1])).getTime(); }
  }
  return 0;
}
function refreshDashBills(){
  if(typeof GolodDB==="undefined"||!GolodDB.getBillsNew){ return; }
  GolodDB.getBillsNew(500).then(function(bills){
    if(bills&&bills.length>0){
      try{localStorage.setItem("golod_bills",JSON.stringify(bills));}catch(e){}
      BILLS=loadRealBills();
      pgDashboard();
    }
  }).catch(function(){});
}

function filterBillsPage(){
  var q=(document.getElementById("bq")?.value||"").toLowerCase();
  var reg=document.getElementById("breg")?.value||"all";
  // reset showN ถ้า filter เปลี่ยน
  var fKey=q+"|"+reg+"|"+(document.getElementById("bst")?.value||"")+"|"+(document.getElementById("bslip")?.value||"");
  if(window._lastFKey!==fKey){ window._billsShowN=100; window._lastFKey=fKey; }
  var st=document.getElementById("bst")?.value||"all";
  var data=window._billsData||[];
  if(!data.length){
    data=loadRealBills();
    // filter ตาม role
    if(CU&&(CU.role==="clerk"||CU.role==="driver"||CU.role==="branch")){
      var _code=CU.clerkCode||"";
      if(!_code){try{var _lu=JSON.parse(localStorage.getItem("golod_users_v1")||"[]").find(function(u){return u.username===CU.username;});if(_lu&&_lu.clerkCode)_code=_lu.clerkCode;}catch(e){}}
      if(_code)data=data.filter(function(b){
        if(b.clerkCode===_code) return true;
        var bn=(b.billNo||"");
        return bn.indexOf(_code)===0 && (bn.charAt(_code.length)>='0'&&bn.charAt(_code.length)<='9' || bn.charAt(_code.length)==='-');
      });
    }
    window._billsData=data;
  }
  var slipF=document.getElementById("bslip")?.value||"all";
  var filtered=data.filter(function(b){
    if(q){
      var inBill=(b.billNo||"").toLowerCase().indexOf(q)>=0;
      var inProv=(b.destProv||"").toLowerCase().indexOf(q)>=0;
      var inSender=(b.senderName||"").toLowerCase().indexOf(q)>=0;
      var inReceiver=(b.receiverName||"").toLowerCase().indexOf(q)>=0;
      var inZone=(b.zone||"").toLowerCase().indexOf(q)>=0;
      var inAmphoe=(b.destAmphoe||"").toLowerCase().indexOf(q)>=0;
      var inGoods=(b.goodsDesc||"").toLowerCase().indexOf(q)>=0;
      if(!inBill&&!inProv&&!inSender&&!inReceiver&&!inZone&&!inAmphoe&&!inGoods) return false;
    }
    if(reg!=="all"&&b.zone!==reg) return false;
    if(st!=="all"&&b.status!==st) return false;
    // filter สลิปโอน (เฉพาะ transfer)
    if(slipF!=="all"&&b.freightPay==="transfer"){
      var hasSlip=!!(
        (b.slipUrl&&b.slipUrl.startsWith("http"))||
        (b.slip1&&b.slip1.startsWith("http"))||
        (b.form&&(b.form.slipUploaded||b.form.slipName))
      );
      var daysSince=0;
      if(b.date){
        var dd=b.date;
        if(/\d{1,2}\/\d{1,2}\/\d{4}/.test(dd)){
          var p=dd.split("/");var y=parseInt(p[2]);if(y>2400)y-=543;
          daysSince=Math.floor((Date.now()-new Date(y,parseInt(p[1])-1,parseInt(p[0])).getTime())/86400000);
        }
      }
      if(slipF==="has_slip"&&!hasSlip) return false;
      if(slipF==="no_slip"&&hasSlip) return false;
      if(slipF==="late3"&&(hasSlip||daysSince<3)) return false;
      if(slipF==="late7"&&(hasSlip||daysSince<7)) return false;
    } else if(slipF!=="all"&&b.freightPay!=="transfer") {
      // ถ้า filter สลิป แต่บิลนี้ไม่ใช่ transfer → ซ่อน
      if(slipF==="has_slip"||slipF==="no_slip"||slipF==="late3"||slipF==="late7") return false;
    }
    return true;
  });
  // เรียงล่าสุดก่อน
  if(typeof sortBillsByNewest==="function") filtered=sortBillsByNewest(filtered);
  var cnt=document.getElementById("bcnt");if(cnt)cnt.textContent=filtered.length+" บิล";
  var t=document.getElementById("btable");
  if(t){
    if(filtered.length===0){
      t.innerHTML='<div style="text-align:center;padding:32px;color:#bbb">ไม่มีบิลที่ตรงกับเงื่อนไข</div>';
    }else{
      var showN = window._billsShowN || 100;
      t.innerHTML=billTable(filtered.slice(0,showN));
      if(filtered.length > showN){
        t.innerHTML += '<div style="text-align:center;padding:14px"><button onclick="window._billsShowN=(window._billsShowN||100)+100;filterBillsPage();" style="padding:8px 20px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600">โหลดเพิ่ม (เหลืออีก '+(filtered.length-showN)+' บิล)</button></div>';
      }
    }
  }
}

function _planDeliverLabel2(b){
  var a=(b&&b.planDeliverFrom)||"", c=(b&&b.planDeliverTo)||"";
  if(!a&&!c) return "";
  function f(d){ var x=new Date(d+"T00:00:00"); if(isNaN(x.getTime())) return d; return x.toLocaleDateString("th-TH",{day:"numeric",month:"short"}); }
  if(a&&c&&c!==a) return f(a)+"–"+f(c);
  return f(a||c);
}

function renderUT(){
  // sync จาก localStorage ก่อนเสมอ
  try{
    var lsU=JSON.parse(localStorage.getItem("golod_users_v1")||"[]");
    if(lsU.length>0){
      // merge: เพิ่ม user ที่ไม่มีใน USERS
      var existIds=USERS.map(function(u){return u.username;});
      lsU.forEach(function(u){
        if(existIds.indexOf(u.username)<0){USERS.push(u);}
        else{var idx=USERS.findIndex(function(x){return x.username===u.username;});if(idx>=0)USERS[idx]=u;}
      });
    }
  }catch(e){}
  var el=document.getElementById("utbody");if(!el)return;
  var rows="";
  USERS.forEach(function(u){
    rows+="<tr><td style='font-weight:600'>"+u.name+"</td><td style='color:#888'>"+u.username+"</td><td>"+rolePill(u.role)+"</td><td>"+u.branch+"</td>";
    rows+='<td><span class="pill '+(u.active?"pg":"px")+'">'+(u.active?"ใช้งาน":"ปิดใช้")+"</span></td>";
    var isMe=u.id===CU.id;
    rows+='<td style="white-space:nowrap"><button class="bts" onclick="openEditU(\''+u.id+'\')">แก้ไข</button> <button class="bts" onclick="openPerm(\''+u.id+'\')">สิทธิ์</button> <button class="bts" style="color:'+(u.active?"#E24B4A":"#1D9E75")+'" onclick="toggleU(\''+u.id+'\')">'+(u.active?"ปิด":"เปิด")+"</button> "+(!isMe?'<button class="bts" style="color:#fff;background:#E24B4A;border-color:#E24B4A" onclick="deleteUser(\''+u.id+'\')">🗑 ลบ</button>':'')+"</td></tr>";
  });
  el.innerHTML=rows;
}
function toggleU(id){var u=USERS.find(function(x){return x.id===id;});if(!u)return;if(u.id===CU.id){alert("ไม่สามารถปิดใช้งานตัวเองได้ครับ");return;}u.active=!u.active;renderUT();}
function deleteUser(id){
  var u=USERS.find(function(x){return x.id===id;});
  if(!u)return;
  if(u.id===CU.id){alert("ไม่สามารถลบตัวเองได้ครับ");return;}
  if(u.role==="admin"&&USERS.filter(function(x){return x.role==="admin"&&x.active;}).length<=1){
    alert("ต้องมี Admin อย่างน้อย 1 คนครับ");return;
  }
  if(!confirm('ลบผู้ใช้ "'+u.name+'" ('+u.username+') ออกจากระบบถาวร?\nการกระทำนี้ไม่สามารถย้อนกลับได้ครับ'))return;
  USERS=USERS.filter(function(x){return x.id!==id;});
  try{
    var deleted=JSON.parse(localStorage.getItem("golod_deleted_users")||"[]");
    deleted.push({id:id,username:u.username,deletedAt:new Date().toISOString()});
    localStorage.setItem("golod_deleted_users",JSON.stringify(deleted));
    localStorage.setItem("golod_users_v1",JSON.stringify(USERS));
  }catch(e){}
  if(typeof GolodDB!=="undefined"&&GolodDB.deleteUser){
    GolodDB.deleteUser(id).then(function(){
      console.log("[GolodApp] Deleted from Firestore:",u.username);
    }).catch(function(e){console.warn("deleteUser Firestore error:",e);});
  }
  renderUT();
  showToast("🗑 ลบ "+u.name+" แล้วครับ");
}

function saveAddU(){

function saveEditU(id){
  var u=null;
  for(var i=0;i<USERS.length;i++){if(USERS[i].id===id){u=USERS[i];break;}}
  if(!u)return;

  var nEl=document.getElementById("eu-n");
  var uEl=document.getElementById("eu-u");
  var pEl=document.getElementById("eu-p");
  var rEl=document.getElementById("eu-r");
  var bEl=document.getElementById("eu-b");
  var eEl=document.getElementById("eu-err");

  var newName=nEl?nEl.value.trim():"";
  var newUN=uEl?uEl.value.trim():"";
  var newPass=pEl?pEl.value:"";

  if(!newName){if(eEl)eEl.innerHTML='<div style="color:#E24B4A;font-size:12px">กรุณากรอกชื่อครับ</div>';return;}
  if(!newUN){if(eEl)eEl.innerHTML='<div style="color:#E24B4A;font-size:12px">กรุณากรอก Username ครับ</div>';return;}

  // ตรวจ username ซ้ำ
  for(var i=0;i<USERS.length;i++){
    if(USERS[i].username===newUN&&USERS[i].id!==id){
      if(eEl)eEl.innerHTML='<div style="color:#E24B4A;font-size:12px">Username "'+newUN+'" มีอยู่แล้วครับ</div>';
      return;
    }
  }
  if(newPass&&newPass.length<6){
    if(eEl)eEl.innerHTML='<div style="color:#E24B4A;font-size:12px">รหัสผ่านต้องอย่างน้อย 6 ตัวครับ</div>';
    return;
  }

  u.name=newName;
  u.username=newUN;
  u.avatar=newName.charAt(0);
  if(newPass)u.password=newPass;
  var newCC=(document.getElementById("eu-cc")?document.getElementById("eu-cc").value:"").trim().toUpperCase();
  if(newCC)u.clerkCode=newCC;
  if(rEl)u.role=rEl.value;
  if(bEl)u.branch=bEl.value;

  var cbs=document.querySelectorAll(".eu-sys:checked");
  if(cbs.length>0){var sys=[];for(var i=0;i<cbs.length;i++)sys.push(cbs[i].value);u.systems=sys;}

  u.perms=Object.assign({},DPERMS[u.role]||DPERMS.clerk,u.perms);

  // บันทึก localStorage
  try{localStorage.setItem("golod_users_v1",JSON.stringify(USERS));}catch(e){}

  // sync to Firestore
  if(typeof GolodDB!=="undefined"){
    GolodDB.saveUser(u).then(function(){
      console.log("[GolodApp] User saved to Firestore:",u.username);
    }).catch(function(e){console.warn("saveUser error:",e);});
  }

  closeMod();
  renderUT();

  showToast('✓ บันทึก '+newName+' เรียบร้อยแล้วครับ');
}

function pgEditLogs(){

  document.getElementById("content").innerHTML='<div class="card"><div class="ct">📝 ประวัติการแก้ไขบิล</div><div style="text-align:center;padding:24px;color:#bbb">⏳ กำลังโหลดประวัติจากระบบ...</div></div>';

  fbP.then(function(fb){

function approveEditRequest(idx){
  try{
    var reqs=JSON.parse(localStorage.getItem("golod_edit_requests")||"[]");
    var pending=reqs.filter(function(r){return r.status==="pending";});
    if(!pending[idx]) return;
    var bill=pending[idx].billNo;
    // mark approved
    var found=reqs.find(function(r){return r.billNo===bill&&r.status==="pending";});
    if(found){found.status="approved";found.approvedAt=new Date().toISOString();found.approvedBy=CU.name;}
    localStorage.setItem("golod_edit_requests",JSON.stringify(reqs));
    // เปิด edit window ให้บิลนั้น 1 ชม.
    var editWindows=JSON.parse(localStorage.getItem("golod_edit_windows")||"{}");
    editWindows[bill]=Date.now()+(1*60*60*1000); // 1 ชม.
    localStorage.setItem("golod_edit_windows",JSON.stringify(editWindows));
    alert("อนุมัติแล้ว — "+pending[idx].requestedBy+" สามารถแก้ไขบิล "+bill+" ได้ภายใน 1 ชม.");
    goSection("editlogs");
  }catch(e){alert("เกิดข้อผิดพลาด");}
}

function exportUsers(){
  var data={
    version:"golod_v1",
    exportedAt:new Date().toLocaleString("th-TH"),
    exportedBy:CU.name,
    users:USERS
  };
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="golod-users-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("📥 Export ข้อมูลผู้ใช้ "+USERS.length+" คน เรียบร้อยแล้วครับ");
}
function importUsers(){
  var inp=document.createElement("input");
  inp.type="file";inp.accept=".json";
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        var imported=data.users||data;
        if(!Array.isArray(imported)||!imported.length){alert("ไฟล์ไม่ถูกต้องครับ");return;}
        if(!confirm("นำเข้าข้อมูลผู้ใช้ "+imported.length+" คน\nจาก: "+(data.exportedAt||"ไม่ระบุ")+"\n\nยืนยันไหมครับ?"))return;
        USERS=imported;
        try{localStorage.setItem("golod_users_v1",JSON.stringify(USERS));}catch(ex){}
        renderUT();
        showToast("📤 Import ข้อมูลผู้ใช้ "+USERS.length+" คน เรียบร้อยแล้วครับ");
      }catch(ex){alert("อ่านไฟล์ไม่ได้ครับ: "+ex.message);}
    };
    reader.readAsText(file,"utf-8");
  };
  document.body.appendChild(inp);inp.click();document.body.removeChild(inp);
}
function showToast(msg){
  var t=document.createElement("div");
  t.style.cssText="position:fixed;top:60px;right:16px;background:#1D9E75;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:320px";
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3000);
}
