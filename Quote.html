<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;background:#F4F7F6;color:#1A2B26;font-size:14px}
.hidden{display:none!important}
.wrap{max-width:920px;margin:0 auto;padding:14px 12px 60px}
.card{background:#fff;border:0.5px solid #E1F5EE;border-radius:12px;padding:16px;margin-bottom:12px}
.ct{font-size:13px;font-weight:700;color:#0F6E56;margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:#446;margin-bottom:4px}
.f{margin-bottom:12px}
input,select{width:100%;padding:9px 10px;border:1px solid #DDE7E3;border-radius:8px;font:inherit;background:#fff}
input:focus,select:focus{outline:none;border-color:#0F6E56;box-shadow:0 0 0 2px #0F6E5622}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:640px){.g3{grid-template-columns:1fr 1fr}}
.hint{font-size:11px;color:#8896a0;margin-top:3px}
.tabs{display:flex;gap:6px;background:#F0F5F3;padding:4px;border-radius:9px;margin-bottom:14px}
.tabs button{flex:1;padding:9px;border:0;background:transparent;border-radius:6px;font:inherit;font-weight:600;color:#77878f;cursor:pointer}
.tabs button.on{background:#fff;color:#0F6E56;box-shadow:0 1px 3px #0002}
.btn{padding:9px 14px;border:1px solid #E1F5EE;background:#fff;border-radius:8px;font:inherit;font-size:13px;cursor:pointer;color:#0F6E56;font-weight:600}
.btn:hover{border-color:#0F6E56}
.btn-main{background:#0F6E56;color:#fff;border-color:#0F6E56}
.res{border:0.5px solid #E1F5EE;border-radius:12px;overflow:hidden;background:#fff}
.res .hd{padding:12px 16px;border-bottom:1px dashed #E1F5EE;display:flex;justify-content:space-between;align-items:center}
.res .hd b{font-size:13px;color:#0F6E56}
.zone{font-size:11px;font-weight:700;color:#8a6d00;background:#FFF6DE;padding:2px 8px;border-radius:20px}
.dest{padding:14px 16px 2px;font-weight:700;font-size:15px}
.meta{padding:0 16px 12px;font-size:12px;color:#77878f}
.steps{padding:2px 16px;border-top:1px dashed #E1F5EE}
.step{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px dotted #EDF3F1;font-size:13px}
.step:last-child{border-bottom:0}
.step .l{color:#77878f}
.step.mut{opacity:.5;text-decoration:line-through}
.step.win .l{color:#B07400;font-weight:700}
.tot{padding:14px 16px;background:#0F6E56;color:#fff;display:flex;justify-content:space-between;align-items:baseline}
.tot .n{font-size:28px;font-weight:700}
.foot{padding:10px 16px;display:flex;gap:8px}
.foot .btn{flex:1}
.empty{padding:38px 16px;text-align:center;color:#8896a0;font-size:13px;line-height:1.8}
.warn{margin:0 16px 12px;padding:9px 11px;border-radius:8px;font-size:12px;background:#FFF6DE;color:#8a6d00;border:1px solid #FFE9AE}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;background:#FFF0E3;color:#A4500C;margin-left:6px;vertical-align:middle}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(16px);background:#1A2B26;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:9999}
.toast.on{opacity:1;transform:translateX(-50%)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

    </div>

</div></div>

<script>
/* ═══════════ ตารางราคา (พอร์ตจาก ThermalBill / GolodLineBot) ═══════════ */
var SIZES=[
 {id:"mini",label:"Mini",maxKg:2,maxCm:30,near:30,far:40},
 {id:"s",label:"S",maxKg:5,maxCm:50,near:60,far:80},
 {id:"m",label:"M",maxKg:10,maxCm:80,near:80,far:100},
 {id:"mplus",label:"M+",maxKg:15,maxCm:100,near:100,far:120},
 {id:"l",label:"L",maxKg:20,maxCm:120,near:120,far:140},
 {id:"xl",label:"XL",maxKg:25,maxCm:150,near:150,far:180},
 {id:"jumbo",label:"Jumbo",maxKg:30,maxCm:180,near:180,far:220},
 {id:"jumbx",label:"JumboX",maxKg:35,maxCm:200,near:250,far:300}
];
/* สินค้าพิเศษ: เรทเหมาต่อหน่วย
   special  = เรทเมื่อปลายทางเป็นพื้นที่พิเศษ
   special2 = เรทเมื่อพื้นที่พิเศษนั้นมีขั้นต่ำ >= 1000 */
var SPECIAL_ITEMS=[
 {id:"oil_small",label:"น้ำมันเครื่อง/ไฮดรอลิก 18-20 ลิตร",near:120,far:150,special:180,special2:null},
 {id:"oil_drum",label:"น้ำมันเครื่อง/ไฮดรอลิก ถัง 200 ลิตร",near:800,far:900,special:1000,special2:1200},
 {id:"chem_small",label:"น้ำยา 20 ลิตร (≤23 กก.)",near:150,far:180,special:200,special2:null},
 {id:"chem_drum",label:"น้ำยา ถัง 200 ลิตร",near:900,far:1000,special:1200,special2:null},
 {id:"tile",label:"กระเบื้อง (คิดตามยาว+น้ำหนัก)",dim:"tile"},
 {id:"wood",label:"ไม้เทียม (คิดตามยาว+น้ำหนัก)",dim:"wood"}
];

/* สินค้าคิดตาม "ยาว + น้ำหนัก" (ยาว=หลัก, เพดานน้ำหนักกำกับ) ใกล้/ไกล ต่อกล่อง/ท่อน
   เพิ่มสินค้าใหม่: เพิ่ม key ใน DIM_GOODS — จะโผล่ใน dropdown อัตโนมัติ */
var DIM_GOODS = {
  tile: { label:"กระเบื้อง", bands:[
    {maxCm:60,  label:"ยาว≤60ซม",  w:[{maxKg:20,near:120,far:150},{maxKg:25,near:150,far:180},{maxKg:30,near:180,far:220},{maxKg:35,near:220,far:240}]},
    {maxCm:90,  label:"ยาว≤90ซม",  w:[{maxKg:20,near:150,far:180},{maxKg:25,near:200,far:220},{maxKg:30,near:220,far:240},{maxKg:35,near:240,far:300}]},
    {maxCm:120, label:"ยาว≤120ซม", w:[{maxKg:20,near:180,far:220},{maxKg:25,near:220,far:240},{maxKg:30,near:240,far:300},{maxKg:35,near:300,far:340}]},
    {maxCm:180, label:"ยาว≤180ซม", w:[{maxKg:35,near:400,far:500}]}
  ]},
  wood: { label:"ไม้เทียม", bands:[
    {maxCm:300, label:"ยาว≤3ม",  w:[{maxKg:25,near:400,far:500},{maxKg:30,near:450,far:500},{maxKg:35,near:500,far:600}]},
    {maxCm:400, label:"ยาว≤4ม",  w:[{maxKg:25,near:500,far:600},{maxKg:30,near:600,far:700},{maxKg:35,near:700,far:800}]},
    {maxCm:600, label:"ยาว≤6ม",  w:[{maxKg:35,near:1500,far:1800}]}
  ]}
};
/* คืน {near,far,label} หรือ {err} */
function dimGoodsPrice(goodsId, kg, cm){
  var g=DIM_GOODS[goodsId]; if(!g) return {err:"unknown"};
  kg=parseFloat(kg)||0; cm=parseFloat(cm)||0;
  if(kg<=0||cm<=0) return {err:"need"};
  var band=g.bands.filter(function(b){return cm<=b.maxCm;})[0];   // ไซส์เล็กสุดที่ครอบความยาว
  if(!band) return {err:"over_cm"};                               // ยาวเกินสุด
  var row=band.w.filter(function(x){return kg<=x.maxKg;})[0];     // น้ำหนักที่ครอบได้
  if(!row) return {err:"over_kg"};                                // หนักเกินช่วงของไซส์นั้น
  return {near:row.near, far:row.far, label:g.label+" "+band.label+" ≤"+row.maxKg+"กก"};
}
// ความยาวสูงสุดของสินค้า (ไว้แจ้ง error)
function dimGoodsMaxCm(goodsId){ var g=DIM_GOODS[goodsId]; return g? g.bands[g.bands.length-1].maxCm : 0; }

var SERVE_BKK=["กรุงเทพมหานคร","นนทบุรี","ปทุมธานี","สมุทรปราการ","สมุทรสาคร","นครปฐม",
 "พระนครศรีอยุธยา","อ่างทอง","สิงห์บุรี","ลพบุรี","สระบุรี","ชัยนาท",
 "ชลบุรี","ระยอง","จันทบุรี","ตราด","ฉะเชิงเทรา","ปราจีนบุรี","สระแก้ว","นครนายก",
 "ราชบุรี","สุพรรณบุรี","กาญจนบุรี","สมุทรสงคราม","เพชรบุรี","ประจวบคีรีขันธ์",
 "นครสวรรค์","อุทัยธานี","กำแพงเพชร","พิจิตร","พิษณุโลก","สุโขทัย","เพชรบูรณ์","ตาก","อุตรดิตถ์",
 "ชุมพร","นครราชสีมา"];
var SERVE_KRT=["ชัยภูมิ","ขอนแก่น","มหาสารคาม","ร้อยเอ็ด","กาฬสินธุ์","อุดรธานี","หนองคาย",
 "หนองบัวลำภู","เลย","สกลนคร","นครพนม","มุกดาหาร","บึงกาฬ"];
var SERVE_SSK=["ศรีสะเกษ","อุบลราชธานี","ยโสธร","อำนาจเจริญ","สุรินทร์","บุรีรัมย์"];

/* โซนจากต้นทางกรุงเทพ — ตรงกับที่ใช้ออกบิลจริง */
var ZONES_BKK={
 "กรุงเทพมหานคร":"near","นนทบุรี":"near","สมุทรปราการ":"near","ปทุมธานี":"near",
 "สมุทรสาคร":"near","สมุทรสงคราม":"near","นครปฐม":"near","พระนครศรีอยุธยา":"near",
 "ลพบุรี":"near","สระบุรี":"near","อ่างทอง":"near","สิงห์บุรี":"near","ชัยนาท":"near",
 "อุทัยธานี":"near","สุพรรณบุรี":"near","กาญจนบุรี":"near","ราชบุรี":"near","เพชรบุรี":"near",
 "ชลบุรี":"near","ระยอง":"near","ฉะเชิงเทรา":"near","ปราจีนบุรี":"near","นครนายก":"near",
 "นครสวรรค์":"far","กำแพงเพชร":"far","พิจิตร":"far","ตาก":"far","จันทบุรี":"far","ตราด":"far",
 "สระแก้ว":"far","ประจวบคีรีขันธ์":"far","ชุมพร":"far","นครราชสีมา":"far","บุรีรัมย์":"far",
 "สุรินทร์":"far","ชัยภูมิ":"far","ศรีสะเกษ":"far","อุบลราชธานี":"far","ยโสธร":"far",
 "อำนาจเจริญ":"far","พิษณุโลก":"far","สุโขทัย":"far","เพชรบูรณ์":"far","อุตรดิตถ์":"far",
 "ขอนแก่น":"far","อุดรธานี":"far","หนองคาย":"far","นครพนม":"far","สกลนคร":"far",
 "กาฬสินธุ์":"far","มหาสารคาม":"far","ร้อยเอ็ด":"far","เลย":"far","หนองบัวลำภู":"far",
 "บึงกาฬ":"far","มุกดาหาร":"far","ลำปาง":"far"
};
/* ⚠️ ต้นทาง KRT / SSK — ยังไม่มีตารางโซนจริง
   ค่าเริ่มต้น: จังหวัดในความรับผิดชอบของสาขา = ใกล้, นอกนั้น = ไกล
   เมื่อได้เรทจริงแล้ว แก้ 2 บรรทัดนี้ แล้วตั้ง ZONE_VERIFIED เป็น true */
function zonesFromCoverage(nearList){
  var z={}, all=SERVE_BKK.concat(SERVE_KRT,SERVE_SSK,[LAMPANG]);
  all.forEach(function(p){ z[p]= nearList.indexOf(p)>=0 ? "near":"far"; });
  return z;
}
var ZONE_TABLE={BKK:ZONES_BKK, KRT:zonesFromCoverage(SERVE_KRT.concat(["นครราชสีมา"])), SSK:zonesFromCoverage(SERVE_SSK)};
var ZONE_VERIFIED={BKK:true, KRT:false, SSK:false};

 "สอยดาว","เขาสมิง","บ่อไร่","เขาชะเมา","สวี","หลังสวน","บ้านไร่","สามเงา",
 "เถิน","แม่พริก","น้ำปาด","นครไทย","ชาติตระการ","หล่มสัก","หล่มเก่า",
 "ภูเรือ","ด่านซ้าย","ศรีสัชนาลัย","สังคม","บ้านแพง","บึงโขงหลง",
 "ดงหลวง","ภูพาน","เต่างอย","สามชัย","ภักดีชุมพล","เทพสถิต",
 "สิรินธร","ศรีเมืองใหม่","นาจะหลวย","น้ำยืน","ภูสิงห์","แม่สอด","พบพระ"];
var MIN_100=["กรุงเทพมหานคร","ปทุมธานี","สมุทรปราการ","สมุทรสาคร","นนทบุรี"];
var MIN_120=["พระนครศรีอยุธยา","นครปฐม","สมุทรสงคราม","เพชรบุรี","ราชบุรี","สุพรรณบุรี",
 "สิงห์บุรี","อ่างทอง","ลพบุรี","สระบุรี","ปราจีนบุรี","นครนายก","ฉะเชิงเทรา","ชลบุรี","ระยอง"];
var MIN_150=["กาญจนบุรี","สระแก้ว","จันทบุรี","ชัยนาท","ประจวบคีรีขันธ์","นครราชสีมา","บุรีรัมย์",
 "มหาสารคาม","ชัยภูมิ","ร้อยเอ็ด","ยโสธร","อุบลราชธานี","ศรีสะเกษ","สุรินทร์"];
var MIN_200=["อุตรดิตถ์","สุโขทัย","พิษณุโลก","พิจิตร","กำแพงเพชร","ตาก","อุทัยธานี","เพชรบูรณ์",
 "ชุมพร","มุกดาหาร","นครพนม","บึงกาฬ","สกลนคร","หนองคาย","เลย","อุดรธานี","กาฬสินธุ์",
 "ตราด","หนองบัวลำภู","อำนาจเจริญ","นครสวรรค์"];

/* อำเภอพิเศษ → จังหวัดที่สังกัด (กัน "สิรินธร" ไปโผล่ตอนเลือกกรุงเทพ) */
var SP_AMPHOE_PROV={
 "น้ำหนาว":"เพชรบูรณ์","นาแห้ว":"เลย","ทองผาภูมิ":"กาญจนบุรี","ปิล็อก":"กาญจนบุรี",
 "ศรีสวัสดิ์":"กาญจนบุรี","สังขละบุรี":"กาญจนบุรี","ไทรโยค":"กาญจนบุรี","หนองปรือ":"กาญจนบุรี",
 "ปากชม":"เลย","นาด้วง":"เลย","ภูเรือ":"เลย","ด่านซ้าย":"เลย",
 "ตาพระยา":"สระแก้ว","โคกสูง":"สระแก้ว","คลองหาด":"สระแก้ว",
 "สอยดาว":"จันทบุรี","เขาสมิง":"ตราด","บ่อไร่":"ตราด","เขาชะเมา":"ระยอง",
 "สวี":"ชุมพร","หลังสวน":"ชุมพร","บ้านไร่":"อุทัยธานี",
 "สามเงา":"ตาก","แม่สอด":"ตาก","พบพระ":"ตาก",
 "เถิน":"ลำปาง","แม่พริก":"ลำปาง","น้ำปาด":"อุตรดิตถ์",
 "นครไทย":"พิษณุโลก","ชาติตระการ":"พิษณุโลก",
 "หล่มสัก":"เพชรบูรณ์","หล่มเก่า":"เพชรบูรณ์","ศรีสัชนาลัย":"สุโขทัย",
 "สังคม":"หนองคาย","บ้านแพง":"นครพนม","บึงโขงหลง":"บึงกาฬ","ดงหลวง":"มุกดาหาร",
 "ภูพาน":"สกลนคร","เต่างอย":"สกลนคร","สามชัย":"กาฬสินธุ์",
 "ภักดีชุมพล":"ชัยภูมิ","เทพสถิต":"ชัยภูมิ",
 "สิรินธร":"อุบลราชธานี","ศรีเมืองใหม่":"อุบลราชธานี","นาจะหลวย":"อุบลราชธานี","น้ำยืน":"อุบลราชธานี",
 "ภูสิงห์":"ศรีสะเกษ"
};

var CU=null;
var specialAreas=[];   // โหลดสดจาก Firestore (settings/specialAreas) เหมือน ThermalBill/บอท

/* ═══════════ engine ═══════════ */
function calcSize(kg,cm){
  var k=parseFloat(kg)||0, c=parseFloat(cm)||0;
  if(k<=0&&c<=0) return null;
  var byKg=null,byCm=null,i;
  for(i=0;i<SIZES.length;i++) if(k<=SIZES[i].maxKg){byKg=SIZES[i];break;}
  for(i=0;i<SIZES.length;i++) if(c<=SIZES[i].maxCm){byCm=SIZES[i];break;}
  if(!byKg||!byCm) return "OVER";
  return SIZES.indexOf(byKg)>=SIZES.indexOf(byCm)?byKg:byCm;
}
function getZone(origin,prov,amphoe){
  if(origin==="BKK"&&prov==="กาญจนบุรี"&&KANCHAN_FAR.indexOf(amphoe||"")>=0) return "far";
  return (ZONE_TABLE[origin]||{})[prov]||"far";
}
function specialAreaMin(prov,amphoe){
  var amp=(amphoe||"").trim(), ov=null;
  specialAreas.forEach(function(sa){
    if(!sa||!sa.amphoe) return;
    if(String(sa.amphoe).trim()!==amp) return;
    if(sa.prov&&String(sa.prov).trim()!==prov) return;
    if(String(sa.tambon||"").trim()) return;   // ระบุตำบลเจาะจง — หน้านี้ไม่รับตำบล
    var m=parseInt(sa.min)||0;
    ov=(ov==null)?m:Math.max(ov,m);
  });
  if(ov!=null) return ov;
  // ลิสต์ฝังในโค้ด: ต้องเป็นอำเภอของจังหวัดที่เลือกเท่านั้น
  if(amp && SP_AMPHOE_PROV[amp]===prov){
    if(MIN1000.indexOf(amp)>=0) return 1000;
    if(MIN500.indexOf(amp)>=0) return 500;
  }
  return 0;
}
function minFreight(prov,amphoe){
  if(!prov) return 0;
  var sp=specialAreaMin(prov,amphoe);
  if(sp>0) return sp;
  var isMuang=(amphoe||"").indexOf("เมือง")===0;
  if(MIN_100.indexOf(prov)>=0) return 100;
  if(MIN_120.indexOf(prov)>=0) return 120;
  if(MIN_150.indexOf(prov)>=0) return isMuang?120:150;
  if(MIN_200.indexOf(prov)>=0) return isMuang?180:200;
  return 0;
}
function baht(n){ return Number(n).toLocaleString("th-TH"); }
function originName(o){ return {BKK:"ศูนย์กรุงเทพ",KRT:"สาขานครราชสีมา",SSK:"สาขาศรีสะเกษ"}[o]||o; }

/* ═══════════ ui ═══════════ */
var mode="gen";
function setMode(m){
  mode=m;
  document.getElementById("tabGen").classList.toggle("on",m==="gen");
  document.getElementById("tabSp").classList.toggle("on",m==="sp");
  document.getElementById("paneGen").classList.toggle("hidden",m!=="gen");
  document.getElementById("paneSp").classList.toggle("hidden",m!=="sp");
  calc();
}
function resEmpty(msg){
  document.getElementById("zoneTag").textContent="";
  document.getElementById("resBody").innerHTML='<div class="empty">'+msg+'</div>';
  window._quote=null;
}
function stepRow(l,v,cls){
  return '<div class="step '+(cls||"")+'"><span class="l">'+l+'</span><span>'+v+'</span></div>';
}
/* อำเภอที่เลือกได้ = "เมือง" + อำเภอพิเศษของจังหวัดนั้น (+ อำเภอพิเศษจาก Firestore) */
function refreshAmphoeList(){
  var prov=document.getElementById("prov").value;
  var dl=document.getElementById("amphoeList");
  dl.innerHTML="";
  if(!prov) return;
  var list=["เมือง"];
  Object.keys(SP_AMPHOE_PROV).forEach(function(a){ if(SP_AMPHOE_PROV[a]===prov) list.push(a); });
  specialAreas.forEach(function(sa){
    if(sa&&sa.amphoe&&(!sa.prov||sa.prov===prov)&&list.indexOf(sa.amphoe)<0) list.push(sa.amphoe);
  });
  list.forEach(function(a){ var o=document.createElement("option"); o.value=a; dl.appendChild(o); });
}
/* อำเภอที่พิมพ์เป็นของจังหวัดอื่นหรือเปล่า */
function amphoeMismatch(prov,amp){
  if(!prov||!amp||amp.indexOf("เมือง")===0) return "";
  var owner=SP_AMPHOE_PROV[amp];
  return (owner&&owner!==prov) ? owner : "";
}

function calc(){
  var origin=document.getElementById("origin").value;
  var prov=document.getElementById("prov").value;
  var amphoe=document.getElementById("amphoe").value.trim();
  var qty=Math.max(1,parseInt(document.getElementById("qty").value)||1);
  var disc=Math.max(0,parseInt(document.getElementById("disc").value)||0);
  var cod=Math.max(0,parseInt(document.getElementById("cod").value)||0);

  if(!prov) return resEmpty("เลือกจังหวัดปลายทาง<br/>แล้วกรอกน้ำหนัก/ขนาด");
  if(prov===LAMPANG&&LAMPANG_OK.indexOf(amphoe)<0)
    return resEmpty("ลำปางส่งได้เฉพาะอำเภอ<br/><b>แม่พริก</b> และ <b>เถิน</b>");

  var zone=getZone(origin,prov,amphoe), perPiece=0, itemLabel="", usedSpRate=false;

  if(mode==="sp"){
    var id=document.getElementById("spItem").value;
    if(!id) return resEmpty("เลือกประเภทสินค้าพิเศษ");
    var row=SPECIAL_ITEMS.filter(function(x){return x.id===id;})[0];

    if(row&&row.dim){
      // สินค้าคิดตามยาว+น้ำหนัก (กระเบื้อง/ไม้เทียม)
      var tKg=document.getElementById("spKg").value, tCm=document.getElementById("spCm").value;
      var tp=dimGoodsPrice(row.dim,tKg,tCm);
      if(tp.err==="need") return resEmpty("กรอกน้ำหนัก (กก.) และด้านยาวสุด (ซม.) ก่อน");
      if(tp.err==="over_cm") return resEmpty(row.label.split(" ")[0]+"ยาวเกิน "+dimGoodsMaxCm(row.dim)+" ซม.<br/>ต้องตีราคาพิเศษ — ทัก LINE @golod");
      if(tp.err==="over_kg") return resEmpty("น้ำหนักเกินเรทของไซส์นี้<br/>ต้องตีราคาพิเศษ — ทัก LINE @golod");
      perPiece=(zone==="near")?tp.near:tp.far;
      itemLabel=tp.label;
    } else {
      var saMin=specialAreaMin(prov,amphoe);
      if(row.special!=null&&saMin>0){
        perPiece=(saMin>=1000)?(row.special2||row.special):row.special;
        usedSpRate=true;
      } else {
        perPiece=(zone==="near")?row.near:row.far;
      }
      itemLabel=row.label;
    }
  } else {
    var size=calcSize(document.getElementById("kg").value,document.getElementById("cm").value);
    if(!size) return resEmpty("กรอกน้ำหนัก (กก.)<br/>หรือขนาด 3 ด้านรวม (ซม.)");
    if(size==="OVER"||size.id==="jumbx")
      return resEmpty("เกินเรทมาตรฐาน (&gt;35 กก. / &gt;200 ซม.)<br/>ต้องตีราคาพิเศษ");
    perPiece=(zone==="near")?size.near:size.far;
    itemLabel="ขนาด "+size.label;
  }

  var floor=minFreight(prov,amphoe);
  var rawTotal=perPiece*qty;
  var afterMin=Math.max(rawTotal,floor);
  var hitMin=afterMin>rawTotal;
  var total=Math.max(0,afterMin-disc);
  var zoneTh=(zone==="near")?"โซนใกล้":"โซนไกล";

  var badge="";
  if(usedSpRate) badge='<span class="badge">เรทพื้นที่พิเศษ</span>';
  else if(specialAreaMin(prov,amphoe)>0) badge='<span class="badge">พื้นที่พิเศษ</span>';

  var steps="";
  steps+=stepRow("ค่าส่ง/ชิ้น",baht(perPiece)+" ฿");
  steps+=stepRow("จำนวน",qty+" ชิ้น");
  steps+=stepRow("รวม ("+baht(perPiece)+" × "+qty+")",baht(rawTotal)+" ฿",hitMin?"mut":"");
  if(floor>0) steps+=stepRow("ขั้นต่ำพื้นที่ (ต่อรายการ)",baht(floor)+" ฿",hitMin?"win":"mut");
  if(disc>0) steps+=stepRow("ส่วนลด","−"+baht(disc)+" ฿");

  var warn = ZONE_VERIFIED[origin] ? "" :
    '<div class="warn">โซนใกล้/ไกล ของต้นทางนี้ยังใช้ค่าเริ่มต้น — ตรวจกับเรทจริงก่อนแจ้งลูกค้า</div>';
  var mm = amphoeMismatch(prov,amphoe);
  if(mm) warn += '<div class="warn">อำเภอ "'+amphoe+'" อยู่ในจังหวัด'+mm+' ไม่ใช่'+prov+
                 ' — ระบบไม่ได้คิดเรทพื้นที่พิเศษให้ ตรวจปลายทางอีกครั้ง</div>';

  document.getElementById("zoneTag").textContent=zoneTh;
  document.getElementById("resBody").innerHTML=
    '<div class="dest">'+(amphoe?amphoe+" ":"")+prov+badge+'</div>'+
    '<div class="meta">'+itemLabel+' · ต้นทาง '+originName(origin)+'</div>'+
    warn+
    '<div class="steps">'+steps+'</div>'+
    '<div class="tot"><span style="font-size:12px;opacity:.85">ค่าขนส่งรวม</span>'+
      '<span class="n">'+baht(total)+'<span style="font-size:13px;opacity:.8"> ฿</span></span></div>'+
    '<div class="foot">'+
      '<button class="btn btn-main" onclick="copyQuote()">คัดลอกข้อความ</button>'+
      '<button class="btn" onclick="resetForm()">ล้าง</button>'+
    '</div>';

  window._quote={prov:prov,amphoe:amphoe,item:itemLabel,zoneTh:zoneTh,origin:originName(origin),
    perPiece:perPiece,qty:qty,rawTotal:rawTotal,floor:floor,hitMin:hitMin,disc:disc,total:total,cod:cod};
}

function copyQuote(){
  var q=window._quote; if(!q) return;
  var t="ค่าขนส่ง "+(q.amphoe?q.amphoe+" ":"")+q.prov+"\n";
  t+=q.item+" · "+q.zoneTh+"\n";
  t+="ค่าส่ง/ชิ้น "+baht(q.perPiece)+" บาท × "+q.qty+" ชิ้น\n";
  if(q.hitMin) t+="ขั้นต่ำพื้นที่ "+baht(q.floor)+" บาท → คิดตามขั้นต่ำ\n";
  if(q.disc>0) t+="ส่วนลด "+baht(q.disc)+" บาท\n";
  t+="รวม "+baht(q.total)+" บาท";
  if(q.cod>0) t+="\nCOD "+baht(q.cod)+" บาท";
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){toast("คัดลอกแล้ว");},function(){fallbackCopy(t);});
  } else fallbackCopy(t);
}
function fallbackCopy(t){
  var ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity=0;
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("คัดลอกแล้ว"); }catch(e){ toast("คัดลอกไม่สำเร็จ"); }
  document.body.removeChild(ta);
}
function resetForm(){
  ["kg","cm","amphoe"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("qty").value=1;
  document.getElementById("disc").value=0;
  document.getElementById("cod").value=0;
  document.getElementById("prov").value="";
  document.getElementById("spItem").value="";
  calc();
}
function toast(m){
  var t=document.getElementById("toast"); t.textContent=m; t.classList.add("on");
  setTimeout(function(){t.classList.remove("on");},1600);
}

function initSelects(){
  var provs=SERVE_BKK.concat(SERVE_KRT,SERVE_SSK,[LAMPANG]).sort(function(a,b){return a.localeCompare(b,"th");});
  var sel=document.getElementById("prov");
  provs.forEach(function(p){var o=document.createElement("option");o.value=p;o.textContent=p;sel.appendChild(o);});
  var sp=document.getElementById("spItem");
  SPECIAL_ITEMS.forEach(function(it){var o=document.createElement("option");o.value=it.id;o.textContent=it.label;sp.appendChild(o);});
  document.getElementById("spItem").addEventListener("change",function(){
    var it=SPECIAL_ITEMS.filter(function(x){return x.id===this.value;},this)[0];
    document.getElementById("tileDims").classList.toggle("hidden", !(it&&it.dim));
  });
  document.getElementById("prov").addEventListener("change",refreshAmphoeList);
  ["origin","prov","amphoe","kg","cm","spItem","spKg","spCm","qty","disc","cod"].forEach(function(id){
    var el=document.getElementById(id);
    el.addEventListener(el.tagName==="SELECT"?"change":"input",calc);
  });
}

/* ═══════════ auth + boot (แพตเทิร์นเดียวกับ CODCheck) ═══════════ */
function showLock(msg){
  document.getElementById("lock-msg").innerHTML=msg;
  document.getElementById("lock-screen").classList.remove("hidden");
  document.getElementById("app-main").classList.add("hidden");
}
function authGate(){
  var GS=(typeof GolodSession!=="undefined")?GolodSession:null;
  if(!GS||!GS.get){ showLock("ไม่พบระบบเข้าสู่ระบบ — เปิดไฟล์นี้ในโฟลเดอร์ระบบโกโลด (ต้องมี session.js)"); return false; }
  CU=GS.get();
  if(!CU){ location.href="GolodApp.html"; return false; }
  if(["admin","branch","clerk"].indexOf(CU.role)<0){
    showLock("หน้านี้เปิดให้เฉพาะแอดมิน หัวหน้าสาขา และเสมียนเท่านั้น");
    return false;
  }
  return true;
}
function loadSpecialAreas(){
  var fs=null; try{ fs=firebase.firestore(); }catch(e){}
  if(!fs) return Promise.resolve();
  return fs.collection("settings").doc("specialAreas").get().then(function(d){
    var v=(d.exists&&d.data().value)||[];
    specialAreas=Array.isArray(v)?v:[];
    try{ localStorage.setItem("golod_special_areas",JSON.stringify(specialAreas)); }catch(e){}
  }).catch(function(){
    try{ specialAreas=JSON.parse(localStorage.getItem("golod_special_areas")||"[]"); }catch(e){ specialAreas=[]; }
  });
}
(function boot(){
  if(!authGate()) return;
  document.getElementById("app-main").classList.remove("hidden");
  initSelects();
  loadSpecialAreas().then(function(){ refreshAmphoeList(); calc(); });   // เรทพื้นที่พิเศษล่าสุด แล้วค่อยคำนวณ
})();
</script>
