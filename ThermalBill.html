  <a href="DailyReport.html" style="font-size:11px;color:#FFE082;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;text-decoration:none">📊 รายงานสิ้นวัน</a>
</div>
<div id="root"></div>
<script>// ===== โกโลด ทรานสปอร์ต — Session Manager =====

var GolodSession = {

  save: function(user, system) {
    var data = {
      id: user.id,
      username: user.username,
      name: user.name,
      role: user.role,
      branch: user.branch,
      avatar: user.avatar,
      system: system,
      perms: user.perms,
      reportPerms: user.reportPerms,
      loginAt: new Date().toISOString(),
      expireAt: new Date(Date.now() + 30*24*60*60*1000).toISOString()
    };
    localStorage.setItem("golod_session", JSON.stringify(data));
  },

  get: function() {
    try {
      var raw = localStorage.getItem("golod_session");
      if (!raw) return null;
      var data = JSON.parse(raw);
      if (new Date(data.expireAt) < new Date()) { this.clear(); return null; }
      return data;
    } catch(e) { return null; }
  },

  clear: function() {
    localStorage.removeItem("golod_session");
  },

  // ===== KEY FIX: Admin/branch ไม่บังคับ perm — เข้าได้ทุกระบบ =====
  require: function(requiredSystem, requiredPerm) {
    var s = this.get();
    if (!s) {
      localStorage.setItem("golod_redirect", window.location.href);
      window.location.href = "GolodApp.html"; // redirect ไป GolodApp ไม่ใช่ AuthSystem
      return null;
    }
    // admin และ branch เข้าได้ทุกระบบ ไม่ต้องตรวจ perm
    if (s.role === "admin" || s.role === "branch") return s;
    // role อื่น ตรวจ perm
    if (requiredPerm) {
      if (!s.perms || !s.perms[requiredPerm]) {
        alert("ไม่มีสิทธิ์เข้าระบบนี้ครับ กรุณาติดต่อ Admin");
        window.location.href = "GolodApp.html";
        return null;
      }
    }
    return s;
  },

  renderTopbar: function(containerId, systemName, systemColor) {
    var s = this.get();
    if (!s) return;
    var el = document.getElementById(containerId);
    if (!el) return;
    var roleLabels = {admin:"แอดมิน",branch:"หัวหน้าสาขา",clerk:"เสมียน",driver:"คนขับ",customer:"ลูกค้า"};
    el.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">' +
      '<div style="font-size:11px;color:#9FE1CB;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px">' + (systemName||"") + '</div>' +
      '<div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px">' +
      '<div style="width:24px;height:24px;border-radius:50%;background:'+(systemColor||"#1D9E75")+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">' + s.avatar + '</div>' +
      '<div><div style="font-size:11px;color:#fff;font-weight:500">' + s.name.split(" ")[0] + '</div>' +
      '<div style="font-size:10px;color:#9FE1CB">' + (roleLabels[s.role]||s.role) + ' · ' + s.branch + '</div></div></div>' +
      '<a href="GolodApp.html" style="font-size:11px;color:#9FE1CB;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;text-decoration:none">← หน้าหลัก</a>' +
      '<button onclick="GolodSession.logout()" style="padding:4px 10px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:20px;font-size:11px;cursor:pointer">ออก</button>' +
      '</div>';
  },

  logout: function() {
    this.clear();
    window.location.href = "GolodApp.html";
  }
};

  if (/โทรศัพท์|มือถือ|iphone|samsung|oppo|vivo|huawei|tablet|ipad|laptop|notebook|คอม|กล้อง/.test(d)) return "อิเล็กทรอนิกส์";

  if (/ตู้เย็น|แอร์|พัดลม|เครื่องซัก|ไมโครเวฟ|หม้อหุง|กาต้มน้ำ|เครื่องใช้ไฟฟ้า|ทีวี|tv/.test(d)) return "เครื่องใช้ไฟฟ้า";

}

function exportAllBillsCSV(dateFrom, dateTo) {

    const PAY_TH = {

      returned: "ตีกลับต้นทาง",

    const rows = all.map(b => {

      const kg = items.reduce((s, i) => s + (parseFloat(i.kg) || 0), 0) || b.totalKg || 0;
      return [b.billNo || "", b.date || "", b.clerkCode || "", b.clerkName || "", b.senderName || "", b.senderPhone || "", b.senderProv || "", b.receiverName || "", b.receiverPhone || "", b.destProv || "", b.destAmphoe || "", (b.receiverAddr || "").replace(/,/g, " "), b.zone || "", PAY_TH[b.freightPay] || b.freightPay || "", b.freightNet || 0, b.codTotal || 0, qty, kg, ST_TH[b.status] || b.status || "", (b.note || "").replace(/,/g, " ")];
    });
    const csv = "﻿" + [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");

const EDIT_WINDOW_MS = 3 * 60 * 60 * 1000; // 3 ชั่วโมง

function canEditBill(bill, sessionUser) {
  if (!bill) return {
    allowed: false,
    reason: "ไม่พบบิล"
  };
  if ((sessionUser === null || sessionUser === void 0 ? void 0 : sessionUser.role) === "admin") return {
    allowed: true,
    reason: "admin"
  };

  // ตรวจ admin อนุมัติพิเศษ
  try {
    const windows = JSON.parse(localStorage.getItem("golod_edit_windows") || "{}");
    if (windows[bill.billNo] && Date.now() < windows[bill.billNo]) {
      const minsLeft = Math.floor((windows[bill.billNo] - Date.now()) / 60000);
      return {
        allowed: true,
        reason: `Admin อนุมัติ (เหลือ ${minsLeft} นาที)`
      };
    }
  } catch (e) {}

  // ตรวจเจ้าของบิล — clerk แก้ได้แค่บิลตัวเอง
  const userCode = (() => {
    try {
      const lu = JSON.parse(localStorage.getItem("golod_users_v1")||"[]").find(u=>u.username===sessionUser.username);
      if (lu&&lu.clerkCode) return lu.clerkCode;
    } catch(e){}
    return sessionUser.clerkCode || null;
  })();
  if (userCode && bill.clerkCode && bill.clerkCode !== userCode &&
      !(bill.billNo && bill.billNo.startsWith(userCode))) {
    return { allowed: false, reason: "บิลนี้ออกโดย " + (bill.clerkCode||"ผู้อื่น") + " — แก้ไขได้เฉพาะเจ้าของบิล" };
  }

  // ตรวจเวลาปกติ 3 ชม.
  if (!bill.createdAt) return {
    allowed: true,
    reason: "ไม่มีเวลาบันทึก"
  };
  const elapsed = Date.now() - new Date(bill.createdAt).getTime();
  if (elapsed > EDIT_WINDOW_MS) {
    const hrs = Math.floor(elapsed / 3600000);
    return {
      allowed: false,
      reason: `ผ่านมา ${hrs} ชม. แล้ว (เกิน 3 ชม.) — ต้องขออนุญาต Admin`
    };
  }
  const minsLeft = Math.floor((EDIT_WINDOW_MS - elapsed) / 60000);
  return {
    allowed: true,
    reason: `เหลือ ${Math.floor(minsLeft / 60)} ชม. ${minsLeft % 60} นาที`
  };
}

function requestAdminEdit(billNo) {
  const requests = JSON.parse(localStorage.getItem("golod_edit_requests") || "[]");

  if (already) {
    alert("ส่งคำขอไปแล้ว รอ Admin อนุมัติ");
    return false;
  }
  const session = JSON.parse(localStorage.getItem("golod_session") || "{}");
  requests.unshift({
    billNo,
    requestedAt: new Date().toISOString(),
    requestedBy: session.name || "",
    requesterCode: session.clerkCode || "",
    status: "pending"
  });
  localStorage.setItem("golod_edit_requests", JSON.stringify(requests.slice(0, 200)));

function genReceiptNo(staffCode) {
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const KEY = "golod_rcpt_seq_"+staffCode+"_"+mm;
  let seq = 1;
  try {
    const stored = localStorage.getItem(KEY);
    if (stored) {
      seq = parseInt(stored) + 1;
    } else {
      // นับจาก receipts ที่มีอยู่
      const all = JSON.parse(localStorage.getItem("golod_receipts")||"[]");
      const mine = all.filter(r=>r.receiptNo&&r.receiptNo.startsWith(staffCode+mm));
      seq = mine.length + 1;
    }
  } catch(e) {}
  localStorage.setItem(KEY, seq);
  return staffCode + mm + String(seq).padStart(4,"0");
}


function bahtText(n) {
  const digits = ["","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
  const positions = ["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
  if (!n || n===0) return "ศูนย์บาทถ้วน";
  let num = Math.round(n*100);
  const satang = num % 100;
  num = Math.floor(num/100);
  function readGroup(n) {
    if (n===0) return "";
    let s="", d=String(n).split("").reverse();
    d.forEach((c,i)=>{
      if(c==="0") return;
      if(i===1&&c==="2") s="ยี่สิบ"+s;
      else if(i===1&&c==="1") s="สิบ"+s;
      else s=digits[parseInt(c)]+positions[i]+s;
    });
    return s;
  }
  let result="";
  const millions=Math.floor(num/1000000);
  if(millions>0){result+=readGroup(millions)+"ล้าน"; num%=1000000;}
  result+=readGroup(num);
  result+="บาท";
  if(satang===0) result+="ถ้วน";
  else {
    const s1=Math.floor(satang/10), s2=satang%10;
    if(s1>0) result+=(s1===2?"ยี่สิบ":s1===1?"สิบ":digits[s1]+(s1>1?"สิบ":""));
    if(s2>0) result+=digits[s2];
    result+="สตางค์";
  }
  return result;
}

// ===== SLIP UPLOADER =====
var SLIP_WINDOW_MS = 12 * 60 * 60 * 1000;

function SlipUploadBtn({ bill, onUploaded, isDriver }) {
  const [loading, setLoading] = React.useState(false);
  const [url, setUrl] = React.useState(bill.slip1 || "");
  const [err, setErr] = React.useState("");
  const ref = React.useRef(null);

  const elapsed = bill.createdAt ? Date.now() - new Date(bill.createdAt).getTime() : 0;
  const canSelfUpload = elapsed < SLIP_WINDOW_MS || isDriver;

  const slipWindows = (() => {
    try { return JSON.parse(localStorage.getItem("golod_slip_windows")||"{}"); } catch(e){ return {}; }
  })();
  const adminApproved = slipWindows[bill.billNo] && Date.now() < slipWindows[bill.billNo];
  const canUpload = canSelfUpload || adminApproved;

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    setLoading(true); setErr("");
    if (typeof GolodStorage === "undefined") {
      setErr("Storage ไม่พร้อม"); setLoading(false); return;
    }
    GolodStorage.uploadAndSave(bill.billNo, f, "slip1")
      .then(function(downloadUrl) {
        setUrl(downloadUrl);
        setLoading(false);
        try {
          const bills = JSON.parse(localStorage.getItem("golod_bills")||"[]");
          const updated = bills.map(b => b.billNo===bill.billNo ? {...b, slip1:downloadUrl} : b);
          localStorage.setItem("golod_bills", JSON.stringify(updated));
        } catch(e){}
        if (onUploaded) onUploaded(downloadUrl);
        alert("✅ อัปโหลดสลิปสำเร็จ!");
      })
      .catch(function(e) {
        setErr("อัปโหลดไม่สำเร็จ: "+e.message);
        setLoading(false);
      });
  };

  const requestSlipAdmin = () => {
    try {
      const reqs = JSON.parse(localStorage.getItem("golod_slip_requests")||"[]");
      const exists = reqs.find(r=>r.billNo===bill.billNo);
      if (!exists) {
        reqs.push({ billNo:bill.billNo, clerkCode:bill.clerkCode, requestedAt:new Date().toISOString(), status:"pending" });
        localStorage.setItem("golod_slip_requests", JSON.stringify(reqs));
        if (typeof GolodDB!=="undefined") GolodDB.updateBill(bill.billNo, {slipRequest:"pending"}).catch(()=>{});
      }
      alert("📨 ส่งคำขออนุมัติให้ admin แล้ว");
    } catch(e) { alert("เกิดข้อผิดพลาด"); }
  };

  if (url) return React.createElement("div", {style:{display:"flex",alignItems:"center",gap:6}},
    React.createElement("a", {href:url, target:"_blank", style:{fontSize:11,color:"#0F6E56",fontWeight:600}}, "✅ ดูสลิป"),
    canUpload && React.createElement("button", {
      onClick:()=>ref.current&&ref.current.click(),
      style:{fontSize:10,padding:"2px 7px",border:"0.5px solid #ccc",borderRadius:5,cursor:"pointer",background:"#f5f5f5"}
    }, "เปลี่ยน"),
    React.createElement("input",{ref,type:"file",accept:"image/*",onChange:handleFile,style:{display:"none"}})
  );

  if (!canUpload) return React.createElement("button", {
    onClick: requestSlipAdmin,
    style:{fontSize:11,padding:"4px 10px",border:"0.5px solid #E67E22",borderRadius:6,background:"#FFF3E0",color:"#E67E22",cursor:"pointer",fontWeight:600}
  }, "📨 ขออนุมัติสลิป");

  return React.createElement("div", {style:{display:"flex",alignItems:"center",gap:6}},
    React.createElement("button", {
      onClick:()=>ref.current&&ref.current.click(),
      disabled:loading,
      style:{fontSize:11,padding:"4px 10px",border:"0.5px solid #1D9E75",borderRadius:6,background:"#E1F5EE",color:"#0F6E56",cursor:"pointer",fontWeight:600}
    }, loading?"⏳ กำลังอัปโหลด...":"📎 แนบสลิป"),
    err && React.createElement("span",{style:{fontSize:10,color:"red"}},err),
    React.createElement("input",{ref,type:"file",accept:"image/*",onChange:handleFile,style:{display:"none"}})
  );
}

      style:{width:"100%",padding:"10px",background:"#1D9E75",color:"#fff",border:"none",borderRadius:9,fontWeight:700,fontSize:14,cursor:"pointer"}
    },"💾 บันทึกและออกใบเสร็จ")
  );

  // mode === list
  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
      React.createElement("div",{style:{fontWeight:700,fontSize:13}},"ใบเสร็จทั้งหมด (",receipts.length,")"),
      React.createElement("button",{
        onClick:()=>{ setMode("form"); setForm(emptyForm()); setSelBill(null); setSearch(""); },
        style:{padding:"6px 14px",background:"#1D9E75",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}
      },"+ ออกใบเสร็จใหม่")
    ),
    receipts.length===0
      ? React.createElement("div",{style:{color:"#aaa",textAlign:"center",padding:30}},"ยังไม่มีใบเสร็จ")
      : React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
          React.createElement("thead",null,
            React.createElement("tr",{style:{background:"#f0faf5"}},
              ["เลขที่ใบเสร็จ","วันที่","ผู้จ่าย","อ้างอิงบิล","ยอด",""].map(h=>
                React.createElement("th",{key:h,style:{padding:"6px 8px",textAlign:"left",fontWeight:600}},h)
              )
            )
          ),
          React.createElement("tbody",null,
            [...receipts].reverse().map((r,i)=>
              React.createElement("tr",{key:i,style:{borderBottom:"0.5px solid #eee"}},
                React.createElement("td",{style:{padding:"6px 8px",fontWeight:600,color:"#0F6E56"}},r.receiptNo),
                React.createElement("td",{style:{padding:"6px 8px",color:"#666"}},r.date),
                React.createElement("td",{style:{padding:"6px 8px"}},r.payerName||"—"),
                React.createElement("td",{style:{padding:"6px 8px",color:"#888"}},r.refBillNo||"—"),
                React.createElement("td",{style:{padding:"6px 8px",fontWeight:600}},fmt(r.total)," ฿"),
                React.createElement("td",{style:{padding:"6px 8px"}},
                  React.createElement("button",{
                    onClick:()=>{ setPreviewRcpt(r); setMode("preview"); },
                    style:{fontSize:11,padding:"3px 9px",background:"#f0faf5",border:"0.5px solid #9FE1CB",borderRadius:6,cursor:"pointer"}
                  },"🖨 พิมพ์")
                )
              )
            )
          )
        )
  );
}
</script>
<script>(function(){var s=GolodSession.get();if(!s){window.location.href="GolodApp.html";return;}GolodSession.renderTopbar("golod-chip","ออกบิล","#1D9E75");

// sync บิลจาก Firestore → localStorage ก่อน render
(function(){
  function doRender(){ ReactDOM.render(React.createElement(ThermalBillingApp),document.getElementById('root')); }
  try {
    // render ก่อนทันที ไม่รอ sync
  doRender();
  // sync Firestore ใน background — useEffect จะ update bills หลัง sync เสร็จ
  if(typeof GolodDB!=="undefined" && typeof GolodDB.getAllBills==="function"){
    GolodDB.getAllBills(3000).then(function(bills){
      if(bills && bills.length>0){
        var local=[];
        try{ local=JSON.parse(localStorage.getItem("golod_bills")||"[]"); }catch(e){}
        var map={};
        local.forEach(function(b){ if(b.billNo) map[b.billNo]=b; });
        bills.forEach(function(b){ if(b.billNo) map[b.billNo]=b; });
        var merged=Object.values(map);
        localStorage.setItem("golod_bills",JSON.stringify(merged));
        console.log("[ThermalBill] Background synced "+merged.length+" bills");
      }
    }).catch(function(){});
  }
  } catch(e){ doRender(); }
})();
})();</script>
